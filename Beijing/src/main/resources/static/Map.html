<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京韵遗风 · 非遗地图</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://api.map.baidu.com/api?type=webgl&v=3.0&ak=yCLrjypN9iVQFLSctIivlrv6wvPRqvDg"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .map-layout {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .map-sidebar {
            width: 320px;
            background: rgba(255, 248, 235, 0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #c9af8b;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 12px 28px rgba(60, 40, 20, 0.4);
            height: fit-content;
            max-height: 70vh;
            overflow-y: auto;
            transition: background 0.3s, border-color 0.3s;
        }

        .sidebar-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #3c291b;
            border-bottom: 2px solid #b89b78;
            padding-bottom: 0.8rem;
            margin-bottom: 1.2rem;
            font-family: 'STKaiti', serif;
        }

        .search-box {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }

        .search-box input {
            flex: 1;
            border: 1px solid #c6a77c;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            background: #fffcf2;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .search-box button {
            background: transparent;
            border: none;
            color: #6b4f33;
            font-size: 1.3rem;
            width: auto;
            height: auto;
            padding: 0.5rem 0.3rem;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            cursor: pointer;
        }

        .search-box button:hover {
            background: transparent;
            color: #9b6739;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
        }

        .filter-tag {
            background: #e9dac8;
            border: 1px solid #b2916d;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.9rem;
            color: #4f351f;
            cursor: pointer;
            transition: 0.2s, background 0.3s, border-color 0.3s, color 0.3s;
        }

        .filter-tag.active {
            background: #a97c53;
            color: #fff6e5;
            border-color: #6d4b2a;
        }

        .point-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .point-item {
            background: #faefe0;
            border: 1px solid #dabd9b;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: 0.2s, background 0.3s, border-color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .point-item:hover {
            background: #ecd7b8;
            border-color: #b6844e;
            transform: translateX(4px);
        }

        .point-icon {
            width: 36px;
            height: 36px;
            background: #b6844e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff2d7;
            flex-shrink: 0;
        }
        .point-icon i {
            width: 1.2rem;
            height: 1.2rem;
            line-height: 1.2rem;
            text-align: center;
            font-size: 1.2rem;
        }

        .point-info {
            flex: 1;
            min-width: 0;
        }

        .point-info h4 {
            font-size: 1.1rem;
            margin: 0 0 0.2rem;
            color: #2e1e12;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .point-info p {
            margin: 0;
            font-size: 0.85rem;
            color: #6b4f33;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .map-container {
            flex: 1;
            border-radius: 2rem;
            overflow: hidden;
            border: 3px solid #b99e7c;
            box-shadow: 0 20px 30px rgba(40, 20, 10, 0.5);
            background: #e3d1bc;
            height: 70vh;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .anchorBL {
            display: none !important;
        }

        .custom-info-window {
            position: absolute;
            background: #fff6e8;
            border: none !important;
            border-radius: 1.2rem;
            padding: 0.8rem 1.2rem;
            width: 280px;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: 0 8px 16px rgba(60, 40, 20, 0.4);
            color: #3e2c1c;
            z-index: 1000;
            cursor: move;
            user-select: none;
        }
        .custom-info-window::-webkit-scrollbar {
            width: 4px;
        }
        .custom-info-window::-webkit-scrollbar-track {
            background: #e9dac8;
            border-radius: 4px;
        }
        .custom-info-window::-webkit-scrollbar-thumb {
            background: #b6844e;
            border-radius: 4px;
        }
        .custom-info-window h5 {
            color: #4a2e1e;
            margin-bottom: 0.4rem;
            border-bottom: 1px dashed #b99e7c;
            padding-bottom: 0.2rem;
        }
        .custom-info-window p {
            margin: 0.3rem 0;
            font-size: 0.9rem;
        }
        .custom-info-window .route-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .custom-info-window .route-buttons button {
            background: #b6844e;
            border: none;
            border-radius: 40px;
            color: white;
            padding: 0.3rem 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            flex: 1;
            white-space: nowrap;
        }
        .custom-info-window .route-buttons button:hover {
            background: #c79b65;
        }
        .custom-info-window .close-custom-info {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            color: #8d765b;
        }
        .custom-info-window .close-custom-info:hover {
            color: #a6552b;
        }

        .map-control-btn {
            position: absolute;
            right: 10px;
            background: #b6844e;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .map-control-btn:hover {
            background: #c79b65;
        }
        #locateBtn {
            top: 10px;
        }

        body.theme-dark .custom-info-window {
            background: #2d2d2d !important;
            color: #e0e0e0 !important;
        }
        body.theme-dark .custom-info-window h5,
        body.theme-dark .custom-info-window p {
            color: #e0e0e0 !important;
        }
        body.theme-soft .custom-info-window {
            background: #fff8e7 !important;
            color: #5f4b3a !important;
        }
        body.theme-soft .custom-info-window h5,
        body.theme-soft .custom-info-window p {
            color: #5f4b3a !important;
        }

        .custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .custom-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .custom-modal {
            background: #fff6e8;
            border: 3px solid #ad8865;
            border-radius: 2rem;
            width: 90%;
            max-width: 1000px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: background 0.3s, border-color 0.3s;
        }

        .custom-modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 2px solid #c7a97e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .custom-modal-title {
            font-size: 2rem;
            font-family: 'STKaiti', serif;
            color: #3c291b;
            transition: color 0.3s;
        }

        .custom-modal-close {
            background: none;
            border: none;
            font-size: 3rem;
            line-height: 1;
            cursor: pointer;
            color: #8d765b;
            transition: color 0.2s;
        }

        .custom-modal-close:hover {
            color: #a6552b;
        }

        .custom-modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            color: #2e1e12;
            transition: color 0.3s;
        }

        .custom-modal-footer {
            padding: 1rem 2rem;
            border-top: 1px solid #d6bc9a;
            text-align: right;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .btn-custom-close {
            background: #b6844e;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1.8rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-custom-close:hover {
            background: #c79b65;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .weather-card {
            background: #faefe0;
            border: 1px solid #d6bc9a;
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s, border-color 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-4px);
            border-color: #b6844e;
        }

        .weather-card .date {
            font-weight: 600;
            font-size: 1.1rem;
            color: inherit;
            margin-bottom: 0.5rem;
        }
        
        .weather-card .icon {
            font-size: 2.5rem;
            color: #b6844e;
            margin: 0.5rem 0;
        }
        
        .weather-card .temp {
            font-size: 1rem;
            color: inherit;
        }
        
        .weather-card .desc {
            font-size: 0.9rem;
            color: #6b4f33;
            margin-top: 0.3rem;
        }

        .weather-detail-modal .custom-modal {
            max-width: 1000px;
        }
        
        .weather-main-info {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .weather-temp {
            font-size: 3rem;
            font-weight: bold;
            color: #b6844e;
        }
        
        .weather-desc {
            font-size: 1.2rem;
            color: #4a2e1e;
        }
        
        .weather-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .metric-card {
            background: #faefe0;
            border-radius: 1rem;
            padding: 0.8rem;
            text-align: center;
            border: 1px solid #d6bc9a;
        }
        
        .metric-icon {
            font-size: 1.5rem;
            color: #b6844e;
            margin-bottom: 0.3rem;
        }
        
        .metric-label {
            font-size: 0.8rem;
            color: #8d765b;
        }
        
        .metric-value {
            font-weight: bold;
            color: #2e1e12;
        }
        
        .sun-times {
            display: flex;
            justify-content: space-around;
            background: #ecdac0;
            border-radius: 2rem;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
        }
        
        .life-index {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-top: 1rem;
        }
        
        .life-item {
            background: #fff2e2;
            border-radius: 1rem;
            padding: 0.5rem;
            text-align: center;
            font-size: 0.8rem;
        }
        
        .life-label {
            font-weight: bold;
            color: #b6844e;
        }
        
        .air-quality {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e9dac8;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 1rem;
        }
        
        .aqi-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .pollutants {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
        }
        
        .hourly-chart {
            width: 100%;
            height: 280px;
            margin-top: 1rem;
            background: #faefe0;
            border-radius: 1rem;
            padding: 0.5rem;
            border: 1px solid #d6bc9a;
        }

        .route-options {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .route-option-btn {
            background: #e9dac8;
            border: 1px solid #b6844e;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .route-option-btn.active {
            background: #b6844e;
            color: white;
        }
        
        .route-switch-btn {
            background: #2ecc71;
            border: none;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            color: white;
            cursor: pointer;
        }
        
        .route-export-btn {
            background: #3498db;
            border: none;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            color: white;
            cursor: pointer;
        }
        
        .route-text {
            background: #faefe0;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        body.theme-dark .map-sidebar,
        body.theme-dark .point-item,
        body.theme-dark .filter-tag,
        body.theme-dark .search-box input,
        body.theme-dark .custom-modal,
        body.theme-dark .weather-card,
        body.theme-dark .metric-card,
        body.theme-dark .sun-times,
        body.theme-dark .life-item,
        body.theme-dark .air-quality,
        body.theme-dark .hourly-chart,
        body.theme-dark .route-text {
            background: #2d2d2d !important;
            border-color: #5a4a3a !important;
            color: #e0e0e0 !important;
        }
        body.theme-dark .sidebar-title,
        body.theme-dark .point-info h4,
        body.theme-dark .point-info p,
        body.theme-dark .custom-modal-title,
        body.theme-dark .weather-card .date,
        body.theme-dark .weather-card .temp,
        body.theme-dark .metric-value,
        body.theme-dark .weather-temp,
        body.theme-dark .weather-desc {
            color: #e0e0e0 !important;
        }
        
        body.theme-dark .filter-tag.active {
            background: #5a4a3a !important;
        }
        
        body.theme-dark .weather-card .icon,
        body.theme-dark .metric-icon {
            color: #c79b65;
        }
        
        body.theme-soft .map-sidebar,
        body.theme-soft .point-item,
        body.theme-soft .filter-tag,
        body.theme-soft .search-box input,
        body.theme-soft .custom-modal,
        body.theme-soft .weather-card,
        body.theme-soft .metric-card,
        body.theme-soft .sun-times,
        body.theme-soft .life-item,
        body.theme-soft .air-quality,
        body.theme-soft .hourly-chart,
        body.theme-soft .route-text {
            background: #fff8e7 !important;
            border-color: #d6bc9a !important;
            color: #5f4b3a !important;
        }
        
        body.theme-soft .sidebar-title,
        body.theme-soft .point-info h4,
        body.theme-soft .point-info p,
        body.theme-soft .custom-modal-title,
        body.theme-soft .weather-card .date,
        body.theme-soft .weather-card .temp,
        body.theme-soft .metric-value,
        body.theme-soft .weather-temp,
        body.theme-soft .weather-desc {
            color: #5f4b3a !important;
        }
        
        body.theme-soft .filter-tag.active {
            background: #d6bc9a !important;
        }
        
        body.theme-soft .weather-card .icon,
        body.theme-soft .metric-icon {
            color: #c2a27e;
        }
    </style>
</head>
<body>
<div class="container-jingyun">
    <nav class="navbar-jingyun d-flex justify-content-between align-items-center">
        <div class="navbar-brand"><i class="fas fa-landmark"></i> 京韵遗风·互动平台</div>
        <div class="d-flex">
            <a href="Index.html" class="nav-link-jingyun"><i class="fas fa-home"></i> 首页</a>
            <a href="Digital.html" class="nav-link-jingyun"><i class="fas fa-building"></i> 数字展厅</a>
            <a href="Map.html" class="nav-link-jingyun active"><i class="fas fa-map-location-dot"></i> 非遗地图</a>
            <a href="AI.html" class="nav-link-jingyun"><i class="fas fa-robot"></i> 京小智</a>
            <a href="Data.html" class="nav-link-jingyun"><i class="fas fa-chart-pie"></i> 数据看板</a>
            <a href="Activity.html" class="nav-link-jingyun"><i class="fas fa-handshake"></i> 传承人平台</a>
            <a href="Person.html" class="nav-link-jingyun"><i class="fas fa-user"></i> 我的护照</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>京·城·非·遗·寻·踪</h1>
        <p>地图寻迹 · 遇见百工</p>
    </div>

    <div class="map-layout">
        <div class="map-sidebar">
            <div class="sidebar-title"><i class="fas fa-map-signs"></i> 非遗点位</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索点位名称...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="filter-tags">
                <span class="filter-tag active" data-filter="all">全部</span>
                <span class="filter-tag" data-filter="博物馆">博物馆</span>
                <span class="filter-tag" data-filter="工坊">工坊</span>
                <span class="filter-tag" data-filter="演出场所">演出</span>
                <span class="filter-tag" data-filter="工作室">工作室</span>
            </div>
            <button class="btn btn-jingyun w-100 mb-3" id="nearbyBtn"><i class="fas fa-location-dot"></i> 搜索周边非遗</button>
            <ul class="point-list" id="pointList"></ul>
        </div>

        <div class="map-container">
            <div id="map"></div>
            <button class="map-control-btn" id="locateBtn"><i class="fas fa-location-arrow"></i> 定位到我</button>
        </div>
    </div>

    <div class="footer-note">
        <i class="fas fa-copyright"></i> 京韵遗风 · 数字博物馆  |  用脚步丈量非遗
    </div>
</div>

<!-- 天气模态框（7天预报） -->
<div class="custom-modal-overlay" id="weatherModalOverlay">
    <div class="custom-modal">
        <div class="custom-modal-header">
            <span class="custom-modal-title" id="weatherModalTitle">天气预报</span>
            <button class="custom-modal-close" id="weatherModalCloseBtn">&times;</button>
        </div>
        <div class="custom-modal-body" id="weatherModalBody"></div>
        <div class="custom-modal-footer">
            <button class="btn-custom-close" id="weatherModalFooterClose">关闭</button>
        </div>
    </div>
</div>

<!-- 详细天气模态框 -->
<div class="custom-modal-overlay weather-detail-modal" id="weatherDetailModalOverlay">
    <div class="custom-modal">
        <div class="custom-modal-header">
            <span class="custom-modal-title" id="weatherDetailTitle">天气详情</span>
            <button class="custom-modal-close" id="weatherDetailCloseBtn">&times;</button>
        </div>
        <div class="custom-modal-body" id="weatherDetailBody"></div>
        <div class="custom-modal-footer">
            <button class="btn-custom-close" id="weatherDetailFooterClose">关闭</button>
        </div>
    </div>
</div>

<!-- 路线图模态框 -->
<div class="custom-modal-overlay" id="routeMapModalOverlay">
    <div class="custom-modal">
        <div class="custom-modal-header">
            <span class="custom-modal-title" id="routeMapTitle">路线规划</span>
            <button class="custom-modal-close" id="routeMapCloseBtn">&times;</button>
        </div>
        <div class="custom-modal-body" id="routeMapBody"></div>
        <div class="custom-modal-footer">
            <button class="route-switch-btn" id="switchRouteBtn">显示路线</button>
            <button class="route-export-btn" id="exportRouteBtn">导出路书</button>
            <button class="btn-custom-close" id="routeMapFooterClose">关闭</button>
        </div>
    </div>
</div>

<div class="theme-switcher">
    <div class="theme-btn light active" data-theme="light" title="日间模式"></div>
    <div class="theme-btn dark" data-theme="dark" title="夜间模式"></div>
    <div class="theme-btn soft" data-theme="soft" title="护眼模式"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
    (function() {
        const API_BASE_URL = 'http://localhost:8080/api';
        let map = null;
        let markers = [];
        let allPoints = [];
        let locationMarker = null;
        let currentLocation = null;
        let currentWeatherData = null;
        let hourlyChart = null;
        let currentRouteLayer = null;      // 当前显示的路线图层对象
        let currentCustomInfoWindow = null;

        // 自定义地图样式
        const customMapStyle = [
            { "featureType": "background", "elementType": "geometry", "stylers": { "color": "#f7efd6" } },
            { "featureType": "road", "elementType": "geometry", "stylers": { "color": "#e6d5b8" } },
            { "featureType": "road", "elementType": "labels", "stylers": { "color": "#7a5a3a" } },
            { "featureType": "green", "elementType": "geometry", "stylers": { "color": "#c2b28b" } },
            { "featureType": "water", "elementType": "geometry", "stylers": { "color": "#c4d5cf" } },
            { "featureType": "building", "elementType": "geometry", "stylers": { "color": "#dcccaa" } },
            { "featureType": "building", "elementType": "labels", "stylers": { "visibility": "off" } },
            { "featureType": "poi", "elementType": "all", "stylers": { "visibility": "off" } },
            { "featureType": "subway", "elementType": "all", "stylers": { "visibility": "off" } },
            { "featureType": "boundary", "elementType": "geometry", "stylers": { "color": "#b89b78", "weight": 1 } },
            { "featureType": "administrative", "elementType": "labels", "stylers": { "color": "#8b6946", "fontSize": 12 } }
        ];

        // 天气相关函数
        function getWeatherIcon(code) {
            if (code === 0) return 'fa-sun';
            if (code === 1) return 'fa-sun';
            if (code === 2) return 'fa-cloud-sun';
            if (code === 3) return 'fa-cloud';
            if (code === 45 || code === 48) return 'fa-smog';
            if (code === 51 || code === 53 || code === 55) return 'fa-cloud-rain';
            if (code === 56 || code === 57) return 'fa-cloud-rain';
            if (code === 61 || code === 63 || code === 65) return 'fa-cloud-rain';
            if (code === 66 || code === 67) return 'fa-cloud-rain';
            if (code === 71 || code === 73 || code === 75) return 'fa-snowflake';
            if (code === 77) return 'fa-snowflake';
            if (code === 80 || code === 81 || code === 82) return 'fa-cloud-showers-heavy';
            if (code === 85 || code === 86) return 'fa-snowflake';
            if (code >= 95 && code <= 99) return 'fa-bolt';
            return 'fa-cloud';
        }

        function getUvLevel(uv) { if (uv <= 2) return '弱'; if (uv <= 5) return '中等'; if (uv <= 7) return '强'; if (uv <= 10) return '很强'; return '极强'; }
        function getWindLevel(speed) { if (speed < 1) return '无风'; if (speed < 5) return '软风'; if (speed < 11) return '轻风'; if (speed < 19) return '微风'; if (speed < 28) return '和风'; if (speed < 38) return '清风'; if (speed < 49) return '强风'; return '大风'; }
        function getWindDirection(deg) { const dirs = ['北', '东北', '东', '东南', '南', '西南', '西', '西北']; return dirs[Math.round(deg / 45) % 8]; }
        function calculateAQI(visibility, humidity) { let aqi = 50; if (visibility < 5) aqi += 30; else if (visibility < 10) aqi += 15; if (humidity > 80) aqi += 20; else if (humidity < 30) aqi += 10; return Math.min(300, Math.max(20, aqi)); }
        function getLifeIndex(dayData) {
            const temp = (dayData.tempMax + dayData.tempMin) / 2, uv = dayData.uvIndex || 0, wind = dayData.windSpeed || 0, rain = dayData.precipitation || 0;
            let dress = temp <= 0 ? '羽绒服' : (temp <= 10 ? '初冬装' : (temp <= 20 ? '春秋装' : '夏装'));
            let sunscreen = uv >= 8 ? 'SPF50+' : (uv >= 5 ? 'SPF30-40' : (uv >= 3 ? 'SPF15-20' : '无需防晒'));
            let travel = (rain > 0 || wind > 30) ? '较不宜' : '适宜';
            let sport = (wind > 25 || rain > 0) ? '较不宜' : '适宜';
            let fishing = (wind > 20 || rain > 0) ? '较不宜' : '适宜';
            let carWash = (rain > 0) ? '不适宜' : '较适宜';
            let allergy = (temp > 15 && uv > 3) ? '极易发' : '不易发';
            let cold = (temp < 10) ? '较易' : '不易';
            return { dress, sunscreen, travel, sport, fishing, carWash, allergy, cold };
        }

        function processHourlyData(hourlyData) {
            if (!hourlyData.length) return [];
            const newData = [...hourlyData];
            const first = newData[0];
            newData.push({
                time: "24:00",
                temperature: first.temperature,
                humidity: first.humidity,
                apparentTemperature: first.apparentTemperature,
                precipitation: first.precipitation,
                weatherCode: first.weatherCode,
                windSpeed: first.windSpeed,
                windDirection: first.windDirection
            });
            return newData;
        }

        function renderHourlyChart(hourlyData) {
            const chartDom = document.getElementById('hourlyChartContainer');
            if (!chartDom) return;
            if (hourlyChart) hourlyChart.dispose();
            hourlyChart = echarts.init(chartDom);
            const processed = processHourlyData(hourlyData);
            const hours = processed.map(h => h.time);
            const temperatures = processed.map(h => h.temperature);
            const humidities = processed.map(h => h.humidity);
            const windSpeeds = processed.map(h => h.windSpeed);
            hourlyChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                legend: { data: ['温度(°C)', '湿度(%)', '风速(km/h)'], textStyle: { color: '#4a2e1e' } },
                xAxis: { type: 'category', data: hours, axisLabel: { rotate: 45, interval: 2 }, name: '时间' },
                yAxis: { type: 'value', name: '温度/湿度/风速' },
                series: [
                    { name: '温度(°C)', type: 'line', data: temperatures, smooth: true, lineStyle: { color: '#e67e22' }, symbol: 'circle' },
                    { name: '湿度(%)', type: 'line', data: humidities, smooth: true, lineStyle: { color: '#3498db' }, symbol: 'diamond' },
                    { name: '风速(km/h)', type: 'line', data: windSpeeds, smooth: true, lineStyle: { color: '#2ecc71' }, symbol: 'triangle' }
                ],
                dataZoom: [{ type: 'slider', start: 0, end: 100, bottom: 10 }, { type: 'inside' }],
                grid: { containLabel: true, bottom: 50 }
            });
            window.addEventListener('resize', () => hourlyChart && hourlyChart.resize());
        }

        function showWeatherDetail(dayData) {
            const title = document.getElementById('weatherDetailTitle');
            title.innerText = `${dayData.date} 天气详情`;
            const uvLevel = getUvLevel(dayData.uvIndex || 0);
            const windLevel = getWindLevel(dayData.windSpeed || 0);
            const windDir = getWindDirection(dayData.windDirection || 0);
            const aqi = calculateAQI(dayData.visibility || 10, dayData.humidity || 50);
            const life = getLifeIndex(dayData);
            const hourly = dayData.hourly || [];
            const hourlyHtml = hourly.length ? `<div id="hourlyChartContainer" class="hourly-chart"></div>` : '<div class="text-center">暂无小时数据</div>';
            const html = `
                <div class="weather-main-info">
                    <div class="weather-temp">${Math.round(dayData.tempMax)}° / ${Math.round(dayData.tempMin)}°</div>
                    <div class="weather-desc"><i class="fas ${getWeatherIcon(dayData.weatherCode)}"></i> ${dayData.weatherDesc}</div>
                    <div>体感温度 ${Math.round(dayData.apparentTemperature || (dayData.tempMax+dayData.tempMin)/2)}°</div>
                </div>
                <div class="weather-metrics">
                    <div class="metric-card"><div class="metric-icon"><i class="fas fa-tachometer-alt"></i></div><div class="metric-label">风力</div><div class="metric-value">${windLevel} (${dayData.windSpeed?.toFixed(1) || 0} km/h)</div><div class="metric-label">${windDir}风</div></div>
                    <div class="metric-card"><div class="metric-icon"><i class="fas fa-tint"></i></div><div class="metric-label">湿度</div><div class="metric-value">${dayData.humidity || 0}%</div></div>
                    <div class="metric-card"><div class="metric-icon"><i class="fas fa-sun"></i></div><div class="metric-label">紫外线</div><div class="metric-value">${uvLevel} (${dayData.uvIndex?.toFixed(1) || 0})</div></div>
                    <div class="metric-card"><div class="metric-icon"><i class="fas fa-eye"></i></div><div class="metric-label">能见度</div><div class="metric-value">${dayData.visibility?.toFixed(1) || 0} km</div></div>
                    <div class="metric-card"><div class="metric-icon"><i class="fas fa-tachometer-alt"></i></div><div class="metric-label">气压</div><div class="metric-value">${Math.round(dayData.pressure || 1013)} hPa</div></div>
                    <div class="metric-card"><div class="metric-icon"><i class="fas fa-cloud-rain"></i></div><div class="metric-label">降水量</div><div class="metric-value">${dayData.precipitation?.toFixed(1) || 0} mm</div></div>
                </div>
                <div class="sun-times">
                    <div><i class="fas fa-sunrise"></i> 日出 ${dayData.sunrise?.substring(11,16) || '--:--'}</div>
                    <div><i class="fas fa-sunset"></i> 日落 ${dayData.sunset?.substring(11,16) || '--:--'}</div>
                </div>
                <div class="air-quality">
                    <div><i class="fas fa-smog"></i> 空气质量指数</div>
                    <div class="aqi-value">${aqi}</div>
                    <div class="pollutants"><span>PM2.5 ${Math.floor(aqi * 0.6)}</span><span>PM10 ${Math.floor(aqi * 1.2)}</span><span>SO₂ ${Math.floor(aqi * 0.3)}</span></div>
                </div>
                <div class="life-index">
                    <div class="life-item"><div class="life-label">👕 穿衣</div>${life.dress}</div>
                    <div class="life-item"><div class="life-label">🧴 防晒</div>${life.sunscreen}</div>
                    <div class="life-item"><div class="life-label">✈️ 旅游</div>${life.travel}</div>
                    <div class="life-item"><div class="life-label">🏃 运动</div>${life.sport}</div>
                    <div class="life-item"><div class="life-label">🎣 钓鱼</div>${life.fishing}</div>
                    <div class="life-item"><div class="life-label">🚗 洗车</div>${life.carWash}</div>
                    <div class="life-item"><div class="life-label">🤧 过敏</div>${life.allergy}</div>
                    <div class="life-item"><div class="life-label">🤒 感冒</div>${life.cold}</div>
                </div>
                ${hourlyHtml}
            `;
            document.getElementById('weatherDetailBody').innerHTML = html;
            document.getElementById('weatherDetailModalOverlay').classList.add('show');
            if (hourly.length) setTimeout(() => renderHourlyChart(hourly), 100);
        }

        function closeWeatherDetailModal() { document.getElementById('weatherDetailModalOverlay').classList.remove('show'); if (hourlyChart) hourlyChart.dispose(); }
        function closeWeatherModal() { document.getElementById('weatherModalOverlay').classList.remove('show'); }
        function closeRouteMapModal() { document.getElementById('routeMapModalOverlay').classList.remove('show'); }

        function showWeatherModal(lat, lng, locationName = '该地点') {
            const overlay = document.getElementById('weatherModalOverlay');
            const title = document.getElementById('weatherModalTitle');
            const body = document.getElementById('weatherModalBody');
            title.innerText = `${locationName} · 7天预报`;
            body.innerHTML = '<div class="text-center"><i class="fas fa-spinner fa-pulse fa-2x"></i><p>加载天气中...</p></div>';
            overlay.classList.add('show');
            fetchWithAuth(`${API_BASE_URL}/weather/forecast?lat=${lat}&lng=${lng}`)
                .then(data => {
                    currentWeatherData = data.daily;
                    if (!currentWeatherData || currentWeatherData.length === 0) { body.innerHTML = '<p class="text-center text-muted">暂无天气数据</p>'; return; }
                    let html = '<div class="weather-grid">';
                    currentWeatherData.forEach((day, idx) => {
                        const iconClass = getWeatherIcon(day.weatherCode);
                        const dateStr = day.date.substring(5);
                        const tempRange = `${Math.round(day.tempMin)}° ~ ${Math.round(day.tempMax)}°`;
                        html += `<div class="weather-card" data-idx="${idx}"><div class="date">${dateStr}</div><div class="icon"><i class="fas ${iconClass}"></i></div><div class="temp">${tempRange}</div><div class="desc">${day.weatherDesc}</div></div>`;
                    });
                    html += '</div>';
                    body.innerHTML = html;
                    document.querySelectorAll('.weather-card').forEach(card => {
                        card.addEventListener('click', () => {
                            const idx = parseInt(card.dataset.idx);
                            if (!isNaN(idx) && currentWeatherData[idx]) showWeatherDetail(currentWeatherData[idx]);
                        });
                    });
                })
                .catch(err => { console.error(err); body.innerHTML = '<p class="text-center text-danger">天气加载失败</p>'; });
        }

        // 清除路线函数
        function clearCurrentRoute() {
            if (currentRouteLayer) {
                try {
                    if (typeof currentRouteLayer.clear === 'function') {
                        currentRouteLayer.clear();
                    } else if (currentRouteLayer.setMap && typeof currentRouteLayer.setMap === 'function') {
                        currentRouteLayer.setMap(null);
                    }
                } catch(e) { console.warn('清除路线失败', e); }
                currentRouteLayer = null;
            }
        }

        // 自定义信息窗
        function showCustomInfoWindow(pointData, marker) {
            if (currentCustomInfoWindow) {
                currentCustomInfoWindow.remove();
                currentCustomInfoWindow = null;
            }
            const point = marker.getPosition();
            const pixel = map.pointToPixel(point);
            let left = pixel.x - 140;
            let top = pixel.y - 100;
            const mapRect = document.getElementById('map').getBoundingClientRect();
            left = Math.min(Math.max(left, 10), mapRect.width - 290);
            top = Math.min(Math.max(top, 10), mapRect.height - 270);
            const div = document.createElement('div');
            div.className = 'custom-info-window';
            div.style.left = left + 'px';
            div.style.top = top + 'px';

            // 判断是否为“我的位置”
            const isCurrentLocation = (pointData.id === 'current');
            let routeButtonsHtml = '';
            if (!isCurrentLocation) {
                // 非遗点位：显示驾车/公交/地铁/天气
                routeButtonsHtml = `
                    <div class="route-buttons">
                        <button class="route-btn" data-mode="driving" data-id="${pointData.id}"><i class="fas fa-car"></i> 驾车</button>
                        <button class="route-btn" data-mode="bus" data-id="${pointData.id}"><i class="fas fa-bus"></i> 公交</button>
                        <button class="route-btn" data-mode="subway" data-id="${pointData.id}"><i class="fas fa-subway"></i> 地铁</button>
                        <button class="weather-btn" data-id="${pointData.id}"><i class="fas fa-cloud-sun"></i> 天气</button>
                    </div>
                `;
            } else {
                // 我的位置：只显示天气按钮
                routeButtonsHtml = `
                    <div class="route-buttons">
                        <button class="weather-btn" data-id="${pointData.id}"><i class="fas fa-cloud-sun"></i> 天气</button>
                    </div>
                `;
            }

            div.innerHTML = `
                <span class="close-custom-info">&times;</span>
                <h5>${pointData.name}</h5>
                <p><i class="fas fa-map-pin"></i> ${pointData.address || '地址未知'}</p>
                <p><i class="fas fa-tag"></i> 类型：${pointData.type || '未分类'}</p>
                ${pointData.contact ? `<p><i class="fas fa-phone"></i> ${pointData.contact}</p>` : ''}
                ${pointData.openHours ? `<p><i class="fas fa-clock"></i> ${pointData.openHours}</p>` : ''}
                ${pointData.description ? `<p>${pointData.description}</p>` : ''}
                ${routeButtonsHtml}
            `;
            document.getElementById('map').appendChild(div);
            currentCustomInfoWindow = div;

            // 拖动逻辑
            let isDrag = false;
            let startX, startY, startLeft, startTop;
            div.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('close-custom-info')) return;
                isDrag = true;
                startX = e.clientX;
                startY = e.clientY;
                startLeft = parseInt(div.style.left);
                startTop = parseInt(div.style.top);
                e.preventDefault();
            });
            document.addEventListener('mousemove', (e) => {
                if (!isDrag) return;
                let dx = e.clientX - startX;
                let dy = e.clientY - startY;
                let newLeft = startLeft + dx;
                let newTop = startTop + dy;
                const maxLeft = mapRect.width - 290;
                const maxTop = mapRect.height - 270;
                newLeft = Math.min(Math.max(newLeft, 10), maxLeft);
                newTop = Math.min(Math.max(newTop, 10), maxTop);
                div.style.left = newLeft + 'px';
                div.style.top = newTop + 'px';
            });
            document.addEventListener('mouseup', () => { isDrag = false; });
            div.querySelector('.close-custom-info').addEventListener('click', () => {
                div.remove();
                currentCustomInfoWindow = null;
            });
            // 绑定路线按钮（非遗点位）
            if (!isCurrentLocation) {
                div.querySelectorAll('.route-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const mode = btn.dataset.mode;
                        const id = btn.dataset.id;
                        const point = allPoints.find(p => p.id == id);
                        if (point) planRoute(point, mode);
                        div.remove();
                        currentCustomInfoWindow = null;
                    });
                });
            }
            // 绑定天气按钮（所有点位都可能有）
            div.querySelectorAll('.weather-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.dataset.id;
                    if (id === 'current') {
                        // 当前位置
                        if (currentLocation) {
                            showWeatherModal(currentLocation.lat, currentLocation.lng, '我的位置');
                        }
                    } else {
                        const point = allPoints.find(p => p.id == id);
                        if (point) showWeatherModal(point.latitude, point.longitude, point.name);
                    }
                    div.remove();
                    currentCustomInfoWindow = null;
                });
            });
        }

        // 存储当前规划数据（方案、起点、终点等）
        let currentPlanData = null;

        // 规划路线：只计算方案，不显示在地图上
        function planRouteWithOptions(pointData, mode) {
            if (!currentLocation) { alert('未获取到您的当前位置，请先点击“定位到我”按钮'); return; }
            const startPoint = new BMapGL.Point(currentLocation.lng, currentLocation.lat);
            const endPoint = new BMapGL.Point(pointData.longitude, pointData.latitude);
            const startName = '我的位置';
            const endName = pointData.name;

            // 创建路线对象，但不显示在地图上（renderOptions.map = null）
            if (mode === 'driving') {
                const routeMethod = new BMapGL.DrivingRoute(map, {
                    renderOptions: { map: null }, // 关键：不显示
                    onSearchComplete: (results) => {
                        if (routeMethod.getStatus() === 0) {
                            const allPlans = results.getNumPlans();
                            const maxPlans = Math.min(allPlans, 3);
                            const plans = [];
                            for (let i = 0; i < maxPlans; i++) {
                                const p = results.getPlan(i);
                                let distance = p.getDistance(true);
                                let duration = p.getDuration(true);
                                let description = '';
                                try {
                                    const segments = p.getRouteSegments();
                                    if (segments && segments.length) {
                                        description = segments.map(s => s.getDescription ? s.getDescription() : '').filter(s => s).join(' → ');
                                    }
                                } catch(e) { description = '详情请查看地图'; }
                                let cost = Math.floor(parseFloat(distance) * 0.5);
                                plans.push({ distance, duration, description, cost, planIndex: i, rawPlan: p });
                            }
                            let bestTimeIdx = 0, bestDistIdx = 0, bestCostIdx = 0;
                            for (let i = 1; i < plans.length; i++) {
                                if (parseInt(plans[i].duration) < parseInt(plans[bestTimeIdx].duration)) bestTimeIdx = i;
                                if (parseFloat(plans[i].distance) < parseFloat(plans[bestDistIdx].distance)) bestDistIdx = i;
                                if (plans[i].cost < plans[bestCostIdx].cost) bestCostIdx = i;
                            }
                            const finalPlans = [];
                            const addedIdx = new Set();
                            finalPlans.push({ ...plans[bestTimeIdx], label: '耗时最短' });
                            addedIdx.add(bestTimeIdx);
                            if (!addedIdx.has(bestDistIdx)) {
                                finalPlans.push({ ...plans[bestDistIdx], label: '距离最短' });
                                addedIdx.add(bestDistIdx);
                            }
                            if (!addedIdx.has(bestCostIdx) && finalPlans.length < 3) {
                                finalPlans.push({ ...plans[bestCostIdx], label: '费用最低' });
                            }
                            for (let i = 0; i < plans.length && finalPlans.length < 3; i++) {
                                if (!addedIdx.has(i)) finalPlans.push({ ...plans[i], label: `方案${finalPlans.length+1}` });
                            }
                            // 保存方案数据，不保存路线对象（因为未显示）
                            currentPlanData = { plans: finalPlans, bestIdx: 0, mode, startPoint, endPoint, startName, endName, rawRouteMethod: null };
                            showRouteMapModal(startName, endName, mode, finalPlans, 0);
                        } else {
                            alert('驾车路线规划失败，请重试');
                        }
                    }
                });
                routeMethod.search(startPoint, endPoint);
            } else {
                let policy = 0;
                if (mode === 'subway') policy = 2;
                const routeMethod = new BMapGL.TransitRoute(map, {
                    renderOptions: { map: null }, // 关键：不显示
                    policy: policy,
                    onSearchComplete: (results) => {
                        if (routeMethod.getStatus() === 0) {
                            const allPlans = results.getNumPlans();
                            const maxPlans = Math.min(allPlans, 3);
                            const plans = [];
                            for (let i = 0; i < maxPlans; i++) {
                                const p = results.getPlan(i);
                                let distance = p.getDistance(true);
                                let duration = p.getDuration(true);
                                let description = '';
                                let cost = 2;
                                try {
                                    const segments = p.getRouteSegments();
                                    if (segments && segments.length) {
                                        description = segments.map(s => s.getDescription ? s.getDescription() : '').filter(s => s).join(' → ');
                                    }
                                } catch(e) { description = '详情请查看地图'; }
                                plans.push({ distance, duration, description, cost, planIndex: i, rawPlan: p });
                            }
                            let bestTimeIdx = 0;
                            for (let i = 1; i < plans.length; i++) {
                                if (parseInt(plans[i].duration) < parseInt(plans[bestTimeIdx].duration)) bestTimeIdx = i;
                            }
                            const finalPlans = [];
                            for (let i = 0; i < plans.length && finalPlans.length < 3; i++) {
                                finalPlans.push({ ...plans[i], label: i === bestTimeIdx ? '推荐' : `方案${finalPlans.length+1}` });
                            }
                            currentPlanData = { plans: finalPlans, bestIdx: 0, mode, startPoint, endPoint, startName, endName, rawRouteMethod: null };
                            showRouteMapModal(startName, endName, mode, finalPlans, 0);
                        } else {
                            alert('公交/地铁路线规划失败，请重试');
                        }
                    }
                });
                routeMethod.search(startPoint, endPoint);
            }
        }

        // 显示路线方案模态框
        function showRouteMapModal(startName, endName, mode, plans, defaultIdx) {
            const modeText = mode === 'driving' ? '驾车' : (mode === 'subway' ? '地铁' : '公交');
            const modalTitle = document.getElementById('routeMapTitle');
            modalTitle.innerText = `${startName} → ${endName} (${modeText}) 路线规划`;
            let plansHtml = '<div class="route-options">';
            plans.forEach((plan, idx) => {
                const isActive = (idx === defaultIdx);
                plansHtml += `<button class="route-option-btn ${isActive ? 'active' : ''}" data-idx="${idx}">${plan.label}：${plan.duration}，${plan.distance}</button>`;
            });
            plansHtml += '</div>';
            let textContent = `【${modeText}路书】\n起点：${startName}\n终点：${endName}\n`;
            plans.forEach((plan, idx) => {
                textContent += `${plan.label}：距离 ${plan.distance}，时间 ${plan.duration}，费用约 ${plan.cost}元\n`;
                if (plan.description) textContent += `详情：${plan.description}\n`;
            });
            textContent += `当前默认：${plans[defaultIdx].label}\n路书生成时间：${new Date().toLocaleString()}\n温馨提示：请遵守交通规则，注意出行安全。`;
            plansHtml += `<div class="route-text" id="routeTextContent">${textContent.replace(/\n/g, '<br>')}</div>`;
            document.getElementById('routeMapBody').innerHTML = plansHtml;
            document.getElementById('routeMapModalOverlay').classList.add('show');

            // 绑定方案切换按钮
            document.querySelectorAll('.route-option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    document.querySelectorAll('.route-option-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const textDiv = document.getElementById('routeTextContent');
                    if (textDiv) {
                        let newText = `【${modeText}路书】\n起点：${startName}\n终点：${endName}\n`;
                        plans.forEach((p, i) => {
                            newText += `${p.label}：距离 ${p.distance}，时间 ${p.duration}，费用约 ${p.cost}元\n`;
                            if (p.description) newText += `详情：${p.description}\n`;
                        });
                        newText += `当前选择：${plans[idx].label}\n路书生成时间：${new Date().toLocaleString()}\n温馨提示：请遵守交通规则，注意出行安全。`;
                        textDiv.innerHTML = newText.replace(/\n/g, '<br>');
                    }
                });
            });

            // 绑定“显示路线”按钮（原“切换路线”）
            const switchBtn = document.getElementById('switchRouteBtn');
            if (switchBtn) {
                switchBtn.onclick = () => {
                    const activeBtn = document.querySelector('.route-option-btn.active');
                    if (!activeBtn) return;
                    const idx = parseInt(activeBtn.dataset.idx);
                    const selectedPlan = plans[idx];
                    if (selectedPlan && currentPlanData) {
                        // 清除当前所有路线
                        clearCurrentRoute();
                        // 根据当前选中的方案重新创建路线对象并显示
                        const start = new BMapGL.Point(currentPlanData.startPoint.lng, currentPlanData.startPoint.lat);
                        const end = new BMapGL.Point(currentPlanData.endPoint.lng, currentPlanData.endPoint.lat);
                        if (currentPlanData.mode === 'driving') {
                            const newDriving = new BMapGL.DrivingRoute(map, {
                                renderOptions: { map: map, autoViewport: true },
                                onSearchComplete: (res) => { if (newDriving.getStatus() !== 0) alert('显示失败'); }
                            });
                            newDriving.search(start, end);
                            currentRouteLayer = newDriving;
                        } else {
                            const policy = (currentPlanData.mode === 'subway' ? 2 : 0);
                            const newTransit = new BMapGL.TransitRoute(map, {
                                renderOptions: { map: map, autoViewport: true },
                                policy: policy,
                                onSearchComplete: (res) => { if (newTransit.getStatus() !== 0) alert('显示失败'); }
                            });
                            newTransit.search(start, end);
                            currentRouteLayer = newTransit;
                        }
                        closeRouteMapModal();
                    } else {
                        alert('无法显示该路线');
                    }
                };
            }

            // 导出按钮
            const exportBtn = document.getElementById('exportRouteBtn');
            if (exportBtn) {
                exportBtn.onclick = () => {
                    const activeBtn = document.querySelector('.route-option-btn.active');
                    const idx = activeBtn ? parseInt(activeBtn.dataset.idx) : defaultIdx;
                    exportRoadbook(plans, idx, startName, endName, mode);
                };
            }
        }

        // 导出路书（Word格式）
        async function exportRoadbook(plans, selectedIdx, startName, endName, mode) {
            const selectedPlan = plans[selectedIdx];
            let text = `【京韵遗风·非遗路书】\n\n`;
            text += `路线类型：${mode === 'driving' ? '驾车' : (mode === 'subway' ? '地铁' : '公交')}\n`;
            text += `起点：${startName}\n`;
            text += `终点：${endName}\n`;
            text += `方案名称：${selectedPlan.label}\n`;
            text += `距离：${selectedPlan.distance}\n`;
            text += `预计耗时：${selectedPlan.duration}\n`;
            text += `费用约：${selectedPlan.cost}元\n`;
            text += `详细路线：${selectedPlan.description || '请查看地图'}\n`;
            text += `\n路书生成时间：${new Date().toLocaleString()}\n`;
            text += `温馨提示：请遵守交通规则，注意出行安全。\n\n`;
            text += `京韵遗风数字博物馆 为您提供非遗文化导览服务。`;

            const mapContainer = document.getElementById('map');
            const controls = document.querySelectorAll('.BMap_stdMpCtrl, .BMap_zlCtrl, .anchorBL, .BMap_nav_ctrl, .map-control-btn');
            const originalStyles = [];
            controls.forEach(ctrl => {
                originalStyles.push(ctrl.style.display);
                ctrl.style.display = 'none';
            });
            await new Promise(resolve => setTimeout(resolve, 500));
            let imgData = '';
            try {
                map.resize();
                const canvas = await html2canvas(mapContainer, { scale: 2, backgroundColor: '#f7efd6', useCORS: true, allowTaint: false });
                imgData = canvas.toDataURL('image/png');
            } catch(err) {
                console.error('截图失败', err);
                imgData = '';
            } finally {
                controls.forEach((ctrl, idx) => {
                    ctrl.style.display = originalStyles[idx];
                });
            }
            const htmlContent = `
                <html>
                <head><meta charset="UTF-8"><title>京韵遗风路书</title></head>
                <body style="font-family: SimSun, '宋体', serif; padding: 20px;">
                    <div style="max-width: 800px; margin: auto;">
                        <h1 style="color: #b6844e;">京韵遗风 · 非遗路书</h1>
                        <div style="white-space: pre-line; line-height: 1.6;">${text.replace(/\n/g, '<br>')}</div>
                        <h3>路线示意图</h3>
                        ${imgData ? `<img src="${imgData}" style="width: 100%; border: 1px solid #b6844e; border-radius: 12px;" />` : '<p style="color: red;">地图截图失败，请手动查看地图。</p>'}
                        <p style="color: #8d765b; margin-top: 20px;">京韵遗风数字博物馆 制作</p>
                    </div>
                </body>
                </html>
            `;
            const blob = new Blob([htmlContent], { type: 'application/msword' });
            saveAs(blob, `京韵遗风_路书_${startName}_到_${endName}.doc`);
        }

        function planRoute(pointData, mode) {
            planRouteWithOptions(pointData, mode);
        }

        // 地图基础功能
        function initMap() {
            map = new BMapGL.Map('map', { preserveDrawingBuffer: true });
            const point = new BMapGL.Point(116.403, 39.915);
            map.centerAndZoom(point, 13);
            map.enableScrollWheelZoom();
            // 添加缩放控件，置于左上角
            map.addControl(new BMapGL.NavigationControl({ anchor: BMAP_ANCHOR_TOP_LEFT }));
            map.addControl(new BMapGL.ScaleControl());
            try { map.setMapStyle({ styleJson: customMapStyle }); } catch(e) {}
        }

        function clearMarkers() { markers.forEach(m => map.removeOverlay(m)); markers = []; }
        function addMarkers(points) {
            clearMarkers();
            points.forEach(p => {
                const point = new BMapGL.Point(p.longitude, p.latitude);
                const marker = new BMapGL.Marker(point);
                marker.id = p.id;
                marker.addEventListener('click', () => showCustomInfoWindow(p, marker));
                map.addOverlay(marker);
                markers.push(marker);
            });
        }

        function renderPointList(points) {
            const listEl = document.getElementById('pointList');
            if (points.length === 0) { listEl.innerHTML = '<li class="text-center text-muted">暂无点位</li>'; return; }
            listEl.innerHTML = points.map(p => {
                let icon = p.type?.includes('博物馆') ? 'landmark' : (p.type?.includes('工坊') ? 'hammer' : (p.type?.includes('演出') ? 'microphone' : (p.type?.includes('工作室') ? 'brush' : 'map-marker-alt')));
                return `<li class="point-item" data-id="${p.id}"><div class="point-icon"><i class="fas fa-${icon} fa-fw"></i></div><div class="point-info"><h4>${p.name}</h4><p><i class="fas fa-map-marker-alt"></i> ${p.address || '地址未知'}</p></div></li>`;
            }).join('');
            document.querySelectorAll('.point-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = parseInt(item.dataset.id);
                    const point = allPoints.find(p => p.id === id);
                    if (point) { map.centerAndZoom(new BMapGL.Point(point.longitude, point.latitude), 16); const marker = markers.find(m => m.id === id); if (marker) showCustomInfoWindow(point, marker); }
                });
            });
        }

        async function loadSites(params = {}) {
            try {
                let url = `${API_BASE_URL}/map/sites`;
                const query = new URLSearchParams(params).toString();
                if (query) url += '?' + query;
                const points = await fetchWithAuth(url);
                allPoints = points;
                addMarkers(points);
                renderPointList(points);
            } catch (err) { alert('加载点位失败'); }
        }

        function filterPointsFrontend() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const activeFilter = document.querySelector('.filter-tag.active')?.dataset.filter || 'all';
            let filtered = allPoints;
            if (activeFilter !== 'all') filtered = filtered.filter(p => p.type === activeFilter);
            if (searchTerm) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
            addMarkers(filtered); renderPointList(filtered);
        }

        async function filterPoints() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const activeFilter = document.querySelector('.filter-tag.active')?.dataset.filter || 'all';
            const params = {};
            if (activeFilter !== 'all') params.type = activeFilter;
            if (searchTerm) params.keyword = searchTerm;
            try { await loadSites(params); } catch (err) { filterPointsFrontend(); }
        }

        async function nearbySearch() {
            const center = map.getCenter();
            try {
                const points = await fetchWithAuth(`${API_BASE_URL}/map/nearby?lng=${center.lng}&lat=${center.lat}&radius=3000`);
                allPoints = points; addMarkers(points); renderPointList(points);
                alert(`附近找到 ${points.length} 个非遗点位`);
            } catch (err) { alert('周边搜索失败'); }
        }

        function createLocationIcon() {
            const canvas = document.createElement('canvas'); canvas.width = 40; canvas.height = 40;
            const ctx = canvas.getContext('2d');
            ctx.beginPath(); ctx.arc(20, 20, 16, 0, 2 * Math.PI); ctx.fillStyle = 'rgba(66,133,244,0.3)'; ctx.fill();
            ctx.beginPath(); ctx.arc(20, 20, 10, 0, 2 * Math.PI); ctx.fillStyle = '#4285f4'; ctx.fill();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath(); ctx.arc(20, 20, 4, 0, 2 * Math.PI); ctx.fillStyle = 'white'; ctx.fill();
            return new BMapGL.Icon(canvas.toDataURL(), new BMapGL.Size(40,40));
        }

        function locateToCurrent() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const { latitude, longitude } = position.coords;
                    currentLocation = { lng: longitude, lat: latitude };
                    const currentPoint = new BMapGL.Point(longitude, latitude);
                    map.centerAndZoom(currentPoint, 15);
                    if (locationMarker) map.removeOverlay(locationMarker);
                    const icon = createLocationIcon();
                    locationMarker = new BMapGL.Marker(currentPoint, { icon });
                    // 绑定点击事件，点击当前位置标记时显示信息窗
                    locationMarker.addEventListener('click', () => {
                        const currentInfo = { name: '我的位置', address: '您当前所在位置', id: 'current', type: '当前位置' };
                        showCustomInfoWindow(currentInfo, locationMarker);
                    });
                    map.addOverlay(locationMarker);
                    // 自动显示当前位置的信息窗
                    const currentInfo = { name: '我的位置', address: '您当前所在位置', id: 'current', type: '当前位置' };
                    showCustomInfoWindow(currentInfo, locationMarker);
                }, error => alert('定位失败'));
            } else alert('浏览器不支持定位');
        }

        // 事件绑定
        document.getElementById('weatherModalCloseBtn').addEventListener('click', closeWeatherModal);
        document.getElementById('weatherModalFooterClose').addEventListener('click', closeWeatherModal);
        document.getElementById('weatherModalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeWeatherModal(); });
        document.getElementById('weatherDetailCloseBtn').addEventListener('click', closeWeatherDetailModal);
        document.getElementById('weatherDetailFooterClose').addEventListener('click', closeWeatherDetailModal);
        document.getElementById('weatherDetailModalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeWeatherDetailModal(); });
        document.getElementById('routeMapCloseBtn').addEventListener('click', closeRouteMapModal);
        document.getElementById('routeMapFooterClose').addEventListener('click', closeRouteMapModal);
        document.getElementById('routeMapModalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeRouteMapModal(); });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('weatherModalOverlay').classList.contains('show')) closeWeatherModal();
                if (document.getElementById('weatherDetailModalOverlay').classList.contains('show')) closeWeatherDetailModal();
                if (document.getElementById('routeMapModalOverlay').classList.contains('show')) closeRouteMapModal();
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const token = getToken();
            if (!token) { alert('请先登录'); window.location.href = 'Index.html'; return; }
            if (typeof BMapGL !== 'undefined') {
                initMap(); locateToCurrent(); await loadSites();
            } else {
                window.onload = async function() { initMap(); locateToCurrent(); await loadSites(); };
            }
            document.getElementById('searchBtn').addEventListener('click', filterPoints);
            document.getElementById('searchInput').addEventListener('keyup', e => { if (e.key === 'Enter') filterPoints(); });
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                    this.classList.add('active'); filterPoints();
                });
            });
            document.getElementById('nearbyBtn').addEventListener('click', nearbySearch);
            document.getElementById('locateBtn').addEventListener('click', locateToCurrent);
        });
    })();
</script>
</body>
</html>
