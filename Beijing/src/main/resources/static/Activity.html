<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京韵遗风 · 传承人互动平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <script src="/js/common.js"></script>
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .role-bar {
            background: rgba(255, 248, 235, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 0.8rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #b99e7c;
            transition: background 0.3s, border-color 0.3s;
        }

        .role-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .role-badge {
            background: #a97c53;
            color: #fff6e5;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 600;
            color: #3c291b;
            border-left: 10px solid #a6552b;
            padding-left: 1.5rem;
            margin: 2rem 0 1.5rem;
            font-family: 'STKaiti', serif;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title .title-icon-text {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .section-title i { color: #a6552b; }

        .heritage-card {
            background: rgba(255, 248, 235, 0.85);
            backdrop-filter: blur(6px);
            border: 1px solid #d6bc9a;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(60, 40, 20, 0.3);
            transition: 0.25s, background 0.3s, border-color 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .heritage-card:hover {
            border-color: #b6844e;
            transform: translateY(-5px);
        }

        .card-img-top {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #bc9f7e;
        }

        .card-body {
            padding: 1.2rem 1rem 1rem;
            flex: 1;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2e1e12;
            margin-bottom: 0.3rem;
            font-family: 'STKaiti', serif;
            transition: color 0.3s;
        }

        .card-sub {
            font-size: 0.9rem;
            color: #815f3f;
            margin-bottom: 0.5rem;
        }

        .card-text {
            color: #4f3a28;
            font-size: 0.95rem;
        }

        .card-footer {
            background: transparent;
            border-top: 1px dashed #bba27b;
            padding: 0.8rem 1rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .btn-sm { font-size: 0.8rem; padding: 0.3rem 0.8rem; }

        .progress-custom {
            width: 100%;
            height: 8px;
            background-color: #e9dac8;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.3rem;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .progress-fill.low { background-color: #28a745; }
        .progress-fill.medium { background-color: #ffc107; }
        .progress-fill.high { background-color: #dc3545; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #6b4f33;
            margin-top: 0.2rem;
        }

        .artwork-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .artwork-item {
            background: #faefe0;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid #d6bc9a;
            box-shadow: 0 6px 12px rgba(60, 40, 20, 0.2);
            transition: background 0.3s, border-color 0.3s;
        }

        .artwork-item img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .artwork-info {
            padding: 0.8rem;
            text-align: center;
        }

        .artwork-info strong { color: inherit; }

        .message-board {
            background: #faefe0;
            border: 2px solid #dabd9b;
            border-radius: 2rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            transition: background 0.3s, border-color 0.3s;
        }

        .message-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px dashed #bba27b;
        }

        .message-avatar {
            width: 50px;
            height: 50px;
            background: #b6844e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff2d7;
            font-size: 1.4rem;
            transition: background 0.3s;
        }

        .message-content { flex: 1; }

        .message-header {
            display: flex;
            justify-content: space-between;
            color: inherit;
            margin-bottom: 0.3rem;
        }

        .message-name { font-weight: 600; }
        .message-time { font-size: 0.8rem; color: #8d765b; }
        .message-text { color: inherit; word-break: break-word; }

        .reply-input {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .reply-input input {
            flex: 1;
            border: 1px solid #c6a77c;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            background: #fffcf2;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .recruit-list {
            list-style: none;
            padding: 0;
        }

        .recruit-item {
            background: #faefe0;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border: 1px solid #dabd9b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            transition: background 0.3s, border-color 0.3s;
        }

        .recruit-info h4 {
            font-size: 1.2rem;
            color: #2e1e12;
            margin-bottom: 0.3rem;
        }

        .recruit-info p {
            margin: 0;
            color: #6b4f33;
            font-size: 0.9rem;
        }

        .recruit-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .float-publish {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #b6844e;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            box-shadow: 0 8px 16px #4f2e18;
            cursor: pointer;
            transition: 0.2s;
            z-index: 100;
            border: 2px solid #e3cfb5;
        }

        .float-publish:hover {
            background: #c79b65;
            transform: scale(1.1);
        }

        .float-publish-menu {
            position: fixed;
            bottom: 120px;
            right: 2rem;
            background: rgba(255, 248, 235, 0.95);
            backdrop-filter: blur(8px);
            border: 2px solid #b6844e;
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }
        .float-publish-menu button {
            white-space: nowrap;
        }

        .custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .custom-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .custom-modal {
            background: #fff6e8;
            border: 3px solid #ad8865;
            border-radius: 2rem;
            width: 90%;
            max-width: 1000px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .custom-modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 2px solid #c7a97e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .custom-modal-title {
            font-size: 2rem;
            font-family: 'STKaiti', serif;
            color: #3c291b;
        }
        .custom-modal-close {
            background: none;
            border: none;
            font-size: 3rem;
            line-height: 1;
            cursor: pointer;
            color: #8d765b;
        }
        .custom-modal-close:hover {
            color: #a6552b;
        }
        .custom-modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            color: #2e1e12;
        }
        .custom-modal-footer {
            padding: 1rem 2rem;
            border-top: 1px solid #d6bc9a;
            text-align: right;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .btn-custom-close {
            background: #b6844e;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1.8rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-custom-close:hover {
            background: #c79b65;
        }

		.modal-grid {
		    display: grid;
		    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
		    gap: 1rem;
		    max-height: 60vh;
		    overflow-y: auto;
		    padding: 0.5rem;
		}

		
		.modal-card {
		    background: #faefe0;
		    border: 1px solid #d6bc9a;
		    border-radius: 1.2rem;
		    padding: 0.8rem;
		    display: flex;
		    flex-direction: column;
		}
		
		.modal-card-img {
		    width: 100%;
		    aspect-ratio: 16 / 9;
		    object-fit: cover;
		    border-radius: 0.8rem;
		    margin-bottom: 0.8rem;
		}

        .modal-card h5 { font-size: 1rem; margin-bottom: 0.3rem; }
        .modal-card p { font-size: 0.8rem; margin: 0.2rem 0; }
		.button-group {
		    display: flex;
		    flex-wrap: nowrap;
		    gap: 0.4rem;
		    justify-content: center;
		    margin-top: 0.6rem;
		}
		.button-group .btn-sm {
		    font-size: 0.7rem;
		    padding: 0.2rem 0.6rem;
		    white-space: nowrap;
		}
        .signup-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #d6bc9a;
        }
        .signup-info {
            flex: 1;
        }
        .signup-actions {
            display: flex;
            gap: 0.5rem;
        }
        .badge {
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        .bg-warning { background-color: #ffc107; color: #212529; }
        .bg-success { background-color: #28a745; color: white; }
        .bg-danger { background-color: #dc3545; color: white; }

        body.theme-dark .custom-modal,
        body.theme-dark .modal-card {
            background: #2d2d2d !important;
            border-color: #5a4a3a !important;
            color: #e0e0e0 !important;
        }
        body.theme-soft .custom-modal,
        body.theme-soft .modal-card {
            background: #fff8e7 !important;
            border-color: #d6bc9a !important;
            color: #5f4b3a !important;
        }

        .more-btn-center {
            text-align: center;
            margin: 1.5rem 0;
        }
        .more-btn-white {
            color: #ffffff !important;
        }
        body.theme-soft .more-btn-white {
            color: #000000 !important;
        }
    </style>
</head>
<body>
<div class="float-publish" id="publishBtn" title="发布内容" style="display: none;">
    <i class="fas fa-plus"></i>
</div>
<div class="float-publish-menu" id="publishMenu">
    <button class="btn-jingyun" data-publish="activity"><i class="fas fa-calendar-alt"></i> 发布活动</button>
    <button class="btn-jingyun" data-publish="artwork"><i class="fas fa-palette"></i> 发布作品</button>
    <button class="btn-jingyun" data-publish="recruit"><i class="fas fa-users"></i> 发布招募</button>
</div>

<div class="container-jingyun">
    <nav class="navbar-jingyun d-flex justify-content-between align-items-center">
        <div class="navbar-brand"><i class="fas fa-landmark"></i> 京韵遗风·互动平台</div>
        <div class="d-flex">
            <a href="Index.html" class="nav-link-jingyun"><i class="fas fa-home"></i> 首页</a>
            <a href="Digital.html" class="nav-link-jingyun"><i class="fas fa-building"></i> 数字展厅</a>
            <a href="Map.html" class="nav-link-jingyun"><i class="fas fa-map-location-dot"></i> 非遗地图</a>
            <a href="AI.html" class="nav-link-jingyun"><i class="fas fa-robot"></i> 京小智</a>
            <a href="Data.html" class="nav-link-jingyun"><i class="fas fa-chart-pie"></i> 数据看板</a>
            <a href="Activity.html" class="nav-link-jingyun active"><i class="fas fa-handshake"></i> 传承人平台</a>
            <a href="Person.html" class="nav-link-jingyun"><i class="fas fa-user"></i> 我的护照</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>传·承·人·互·动·平·台</h1>
        <p>工坊 · 非遗交流 · 作品 · 招募</p>
    </div>

    <div class="role-bar">
        <div class="role-info">
            <i class="fas fa-user-circle" style="font-size: 2rem; color: #8b623f;"></i>
            <span>当前身份：<span class="role-badge" id="roleDisplay">加载中...</span></span>
            <span class="text-muted small" style="margin-left: 1rem;">邀请码认证后可发布内容</span>
        </div>
        <div><i class="fas fa-ticket-alt"></i> 邀请码: <strong>JINGYUN-2026</strong></div>
    </div>

    <div class="section-title">
        <div class="title-icon-text"><i class="fas fa-calendar-alt"></i> 近期工坊 / 活动</div>
    </div>
    <div class="row row-cols-1 row-cols-md-3 g-4 mb-4" id="activityGrid"></div>
    <div class="more-btn-center">
        <button class="btn-jingyun-outline btn-sm more-btn-white" id="moreActivitiesBtn">更多活动</button>
    </div>

    <div class="section-title">
        <div class="title-icon-text"><i class="fas fa-palette"></i> 传承人最新作品</div>
    </div>
    <div class="artwork-grid mb-5" id="artworkGrid"></div>
    <div class="more-btn-center">
        <button class="btn-jingyun-outline btn-sm more-btn-white" id="moreArtworksBtn">更多作品</button>
    </div>

    <div class="section-title">
        <div class="title-icon-text"><i class="fas fa-comments"></i> 非遗交流</div>
    </div>
    <div class="message-board">
        <div id="messageList"></div>
        <div class="more-btn-center">
            <button class="btn-jingyun-outline btn-sm" id="moreMessagesBtn">查看更多</button>
        </div>
        <div class="reply-input">
            <input type="text" id="questionInput" placeholder="写下您的交流内容...">
            <button class="btn-jingyun" id="askBtn"><i class="fas fa-paper-plane"></i> 发布</button>
        </div>
    </div>

    <div class="section-title">
        <div class="title-icon-text"><i class="fas fa-users"></i> 学徒招募</div>
    </div>
    <div class="recruit-list" id="recruitList"></div>
    <div class="more-btn-center">
        <button class="btn-jingyun-outline btn-sm more-btn-white" id="moreRecruitsBtn">更多招募</button>
    </div>

    <div class="footer-note">
        <i class="fas fa-copyright"></i> 京韵遗风 · 数字博物馆  |  活态传承 你我同行
    </div>
</div>

<div id="publishActivityModal" class="custom-modal-overlay">
    <div class="custom-modal">
        <div class="custom-modal-header"><span class="custom-modal-title">发布活动</span><button class="custom-modal-close">&times;</button></div>
        <div class="custom-modal-body">
            <form id="publishActivityForm">
                <div class="mb-3"><label class="form-label">活动标题</label><input type="text" class="form-control" id="activityTitle" required></div>
                <div class="mb-3"><label class="form-label">活动类型</label><select class="form-select" id="activityType"><option value="体验课">体验课</option><option value="讲座">讲座</option><option value="展览">展览</option><option value="演出">演出</option></select></div>
                <div class="mb-3"><label class="form-label">开始时间</label><input type="datetime-local" class="form-control" id="activityStartTime" required></div>
                <div class="mb-3"><label class="form-label">结束时间</label><input type="datetime-local" class="form-control" id="activityEndTime" required></div>
                <div class="mb-3"><label class="form-label">最大参与人数</label><input type="number" class="form-control" id="activityMaxParticipants" value="10" min="1"></div>
                <div class="mb-3"><label class="form-label">活动描述</label><textarea class="form-control" id="activityDesc" rows="3" required></textarea></div>
                <div class="mb-3"><label class="form-label">活动封面</label><input type="file" class="form-control" id="activityImageFile" accept="image/*" required></div>
                <div class="mb-3"><label class="form-label">点位ID（可选）</label><input type="number" class="form-control" id="activitySiteId" placeholder="可选"></div>
                <input type="hidden" id="activityImageUrl">
            </form>
        </div>
        <div class="custom-modal-footer"><button class="btn-custom-close" id="submitPublishActivityBtn">发布</button><button class="btn-custom-close close-modal">取消</button></div>
    </div>
</div>

<div id="publishArtworkModal" class="custom-modal-overlay">
    <div class="custom-modal">
        <div class="custom-modal-header"><span class="custom-modal-title">发布作品</span><button class="custom-modal-close">&times;</button></div>
        <div class="custom-modal-body">
            <form id="publishArtworkForm">
                <div class="mb-3"><label class="form-label">作品标题</label><input type="text" class="form-control" id="artworkTitle" required></div>
                <div class="mb-3"><label class="form-label">作品描述</label><textarea class="form-control" id="artworkDesc" rows="3" required></textarea></div>
                <div class="mb-3"><label class="form-label">作品图片</label><input type="file" class="form-control" id="artworkImageFile" accept="image/*" required></div>
                <input type="hidden" id="artworkImageUrl">
            </form>
        </div>
        <div class="custom-modal-footer"><button class="btn-custom-close" id="submitPublishArtworkBtn">发布</button><button class="btn-custom-close close-modal">取消</button></div>
    </div>
</div>

<div id="publishRecruitModal" class="custom-modal-overlay">
    <div class="custom-modal">
        <div class="custom-modal-header"><span class="custom-modal-title">发布学徒招募</span><button class="custom-modal-close">&times;</button></div>
        <div class="custom-modal-body">
            <form id="publishRecruitForm">
                <div class="mb-3"><label class="form-label">招募标题</label><input type="text" class="form-control" id="recruitTitle" required></div>
                <div class="mb-3"><label class="form-label">招募描述</label><textarea class="form-control" id="recruitDesc" rows="3" required></textarea></div>
                <div class="mb-3"><label class="form-label">传承人姓名</label><input type="text" class="form-control" id="recruitInheritor" required></div>
                <div class="mb-3"><label class="form-label">最大申请人数</label><input type="number" class="form-control" id="recruitMaxApplicants" value="10" min="1" required></div>
            </form>
        </div>
        <div class="custom-modal-footer"><button class="btn-custom-close" id="submitPublishRecruitBtn">发布</button><button class="btn-custom-close close-modal">取消</button></div>
    </div>
</div>

<div id="editActivityModal" class="custom-modal-overlay">
    <div class="custom-modal">
        <div class="custom-modal-header"><span class="custom-modal-title">编辑活动</span><button class="custom-modal-close">&times;</button></div>
        <div class="custom-modal-body">
            <form id="editActivityForm">
                <input type="hidden" id="editActivityId">
                <div class="mb-3"><label class="form-label">活动标题</label><input type="text" class="form-control" id="editActivityTitle" required></div>
                <div class="mb-3"><label class="form-label">活动类型</label><select class="form-select" id="editActivityType"><option value="体验课">体验课</option><option value="讲座">讲座</option><option value="展览">展览</option><option value="演出">演出</option></select></div>
                <div class="mb-3"><label class="form-label">开始时间</label><input type="datetime-local" class="form-control" id="editActivityStartTime" required></div>
                <div class="mb-3"><label class="form-label">结束时间</label><input type="datetime-local" class="form-control" id="editActivityEndTime" required></div>
                <div class="mb-3"><label class="form-label">最大参与人数</label><input type="number" class="form-control" id="editActivityMaxParticipants" min="1" required></div>
                <div class="mb-3"><label class="form-label">活动描述</label><textarea class="form-control" id="editActivityDesc" rows="3" required></textarea></div>
                <div class="mb-3"><label class="form-label">当前封面</label><div><img id="editActivityCurrentImage" src="" style="max-width:200px; max-height:150px; border-radius:0.5rem;"></div></div>
                <div class="mb-3"><label class="form-label">更新封面（可选）</label><input type="file" class="form-control" id="editActivityImageFile" accept="image/*"></div>
                <div class="mb-3"><label class="form-label">点位ID（可选）</label><input type="number" class="form-control" id="editActivitySiteId" placeholder="可选"></div>

                <div class="mb-3"><label class="form-label">更新图片（可选）</label><input type="file" class="form-control" id="editArtworkImageFile" accept="image/*"></div>

        <div class="custom-modal-footer"><button class="btn-custom-close close-modal">关闭</button></div>

<div class="theme-switcher">
    <div class="theme-btn light active" data-theme="light"></div>
    <div class="theme-btn dark" data-theme="dark"></div>
    <div class="theme-btn soft" data-theme="soft"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
(function() {
    const API_BASE_URL = 'http://localhost:8080/api';
    let currentUser = null;
    let isInheritor = false;
    let allMessages = [];
    let allActivities = [];
    let allArtworks = [];
    let allRecruits = [];

    function showModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.classList.add('show');
    }
    function hideModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.classList.remove('show');
    }
    function closeAllModals() {
        document.querySelectorAll('.custom-modal-overlay').forEach(m => m.classList.remove('show'));
    }
    document.querySelectorAll('.custom-modal-close, .close-modal').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const modal = btn.closest('.custom-modal-overlay');
            if (modal) modal.classList.remove('show');
        });
    });
    document.querySelectorAll('.custom-modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('show');
        });
    });

    async function loadUserInfo() {
        try {
            currentUser = await fetchWithAuth(API_BASE_URL + '/user/info');
            isInheritor = currentUser.role === 'inheritor';
            updateRoleUI();
        } catch (err) { console.error(err); }
    }
    function updateRoleUI() {
        const roleDisplay = document.getElementById('roleDisplay');
        if (roleDisplay) {
            roleDisplay.innerText = isInheritor ? '传承人' : '普通用户';
            roleDisplay.style.backgroundColor = isInheritor ? '#b6844e' : '#a97c53';
        }
        const publishBtn = document.getElementById('publishBtn');
        if (publishBtn) publishBtn.style.display = isInheritor ? 'flex' : 'none';
        const inviteCodeSpan = document.querySelector('.role-bar div:last-child');
        const smallHint = document.querySelector('.role-info .small');
        if (isInheritor) {
            if (inviteCodeSpan) inviteCodeSpan.style.display = 'none';
            if (smallHint) smallHint.style.display = 'none';
        } else {
            if (inviteCodeSpan) inviteCodeSpan.style.display = 'block';
            if (smallHint) smallHint.style.display = 'inline-block';
        }
    }

    async function uploadImage(file, type) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('type', type);
        return await uploadWithAuth(API_BASE_URL + '/upload/image', formData);
    }

    document.getElementById('submitPublishActivityBtn')?.addEventListener('click', async () => {
        const title = document.getElementById('activityTitle')?.value.trim();
        const type = document.getElementById('activityType')?.value;
        const startTime = document.getElementById('activityStartTime')?.value;
        const endTime = document.getElementById('activityEndTime')?.value;
        const maxParticipants = parseInt(document.getElementById('activityMaxParticipants')?.value);
        const description = document.getElementById('activityDesc')?.value.trim();
        const siteId = document.getElementById('activitySiteId')?.value ? parseInt(document.getElementById('activitySiteId').value) : null;
        const imageFile = document.getElementById('activityImageFile')?.files[0];
        if (!title || !startTime || !endTime || !description) { alert('请填写必填项'); return; }
        if (!imageFile) { alert('请上传活动封面图片'); return; }
        try {
            const imageUrl = await uploadImage(imageFile, 'activity');
            await fetchWithAuth(API_BASE_URL + '/activity/publish', {
                method: 'POST',
                body: JSON.stringify({
                    title, type, startTime, endTime, maxParticipants, description, siteId,
                    imageUrl, inheritorId: currentUser.id
                })
            });
            alert('活动发布成功');
            hideModal('publishActivityModal');
            document.getElementById('publishActivityForm')?.reset();
            loadActivities();
        } catch (err) { alert('发布失败：' + err.message); }
    });
    document.getElementById('submitPublishArtworkBtn')?.addEventListener('click', async () => {
        const title = document.getElementById('artworkTitle')?.value.trim();
        const description = document.getElementById('artworkDesc')?.value.trim();
        const imageFile = document.getElementById('artworkImageFile')?.files[0];
        if (!title || !description) { alert('请填写标题和描述'); return; }
        if (!imageFile) { alert('请上传作品图片'); return; }
        try {
            const imageUrl = await uploadImage(imageFile, 'artwork');
            await fetchWithAuth(API_BASE_URL + '/artwork/publish', {
                method: 'POST',
                body: JSON.stringify({ title, description, imageUrl })
            });
            alert('作品发布成功');
            hideModal('publishArtworkModal');
            document.getElementById('publishArtworkForm')?.reset();
            loadArtworks();
        } catch (err) { alert('发布失败：' + err.message); }
    });
    document.getElementById('submitPublishRecruitBtn')?.addEventListener('click', async () => {
        const title = document.getElementById('recruitTitle')?.value.trim();
        const description = document.getElementById('recruitDesc')?.value.trim();
        const inheritorName = document.getElementById('recruitInheritor')?.value.trim();
        const maxApplicants = parseInt(document.getElementById('recruitMaxApplicants')?.value);
        if (!title || !description || !inheritorName || !maxApplicants) { alert('请填写所有字段'); return; }
        try {
            await fetchWithAuth(API_BASE_URL + '/recruit/add', {
                method: 'POST',
                body: JSON.stringify({ title, description, inheritorName, maxApplicants })
            });
            alert('招募发布成功');
            hideModal('publishRecruitModal');
            document.getElementById('publishRecruitForm')?.reset();
            loadRecruits();
        } catch (err) { alert('发布失败：' + err.message); }
    });

    async function checkActivityCollected(activityId) {
        try {
            const data = await fetchWithAuth(API_BASE_URL + '/collection/check?targetType=activity&targetId=' + activityId);
            return data.collected === true;
        } catch { return false; }
    }
    async function addActivityCollection(activityId, btn) {
        try {
            await fetchWithAuth(API_BASE_URL + '/collection/add', {
                method: 'POST',
                body: JSON.stringify({ targetType: 'activity', targetId: activityId })
            });
            btn.disabled = true;
            btn.innerText = '已收藏';
            btn.dataset.collected = 'true';
            return true;
        } catch (err) {
            if (err.message && err.message.includes('已经收藏过了')) {
                btn.disabled = true;
                btn.innerText = '已收藏';
                btn.dataset.collected = 'true';
                alert('已收藏，请在个人信息界面取消收藏');
            } else {
                alert('收藏失败：' + err.message);
            }
            return false;
        }
    }

    async function loadActivities() {
        try {
            allActivities = await fetchWithAuth(API_BASE_URL + '/activity/list?status=1');
            const grid = document.getElementById('activityGrid');
            if (!grid) return;
            if (!allActivities.length) {
                grid.innerHTML = '<div class="no-data">暂无活动</div>';
                return;
            }
            const collected = {};
            for (const act of allActivities) {
                collected[act.id] = await checkActivityCollected(act.id);
            }
            const display = allActivities.slice(0, 3);
            grid.innerHTML = display.map(act => renderActivityCard(act, collected[act.id])).join('');
            bindActivityEvents();
        } catch (err) { console.error(err); }
    }
    function renderActivityCard(act, isCollected) {
        const isMyActivity = isInheritor && act.inheritorId === currentUser.id;
        const isFull = act.currentParticipants >= act.maxParticipants;
        const isEnded = new Date(act.endTime) < new Date();
        const canSignup = !isMyActivity && !isFull && !isEnded && act.status === 1;
        const signupBtnText = isEnded ? '已结束' : (isFull ? '已满' : '报名');
        const percent = act.maxParticipants > 0 ? (act.currentParticipants / act.maxParticipants) * 100 : 0;
        const progressClass = percent < 50 ? 'low' : (percent < 80 ? 'medium' : 'high');
        let actionButtons = '';
        if (isInheritor && isMyActivity) {
            actionButtons = `
                <div class="activity-actions">
                    <button class="btn-jingyun-outline btn-sm view-activity-signups" data-id="${act.id}"><i class="fas fa-users"></i> 查看申请</button>
                    <button class="btn-jingyun-outline btn-sm edit-activity" data-id="${act.id}"><i class="fas fa-edit"></i> 编辑</button>
                    ${act.status === 1 ? `<button class="btn-jingyun-outline btn-sm end-activity" data-id="${act.id}"><i class="fas fa-stop"></i> 结束</button>` : ''}
                </div>
            `;
        } else {
            actionButtons = `<div class="activity-actions"><button class="btn-jingyun-outline btn-sm view-activity-signups" data-id="${act.id}"><i class="fas fa-users"></i> 查看申请</button></div>`;
        }
        return `
            <div class="col">
                <div class="heritage-card" data-id="${act.id}">
                    <img src="${act.imageUrl || 'https://picsum.photos/400/200?random=' + act.id}" class="card-img-top" alt="${act.title}">
                    <div class="card-body">
                        <h5 class="card-title">${escapeHtml(act.title)}</h5>
                        <div class="card-sub"><i class="fas fa-user"></i> 传承人ID: ${act.inheritorId}</div>
                        <div class="card-sub"><i class="fas fa-clock"></i> ${new Date(act.startTime).toLocaleString()} ~ ${new Date(act.endTime).toLocaleString()}</div>
                        <p class="card-text">${escapeHtml(act.description || '暂无描述')}</p>
                        ${actionButtons}
                    </div>
                    <div class="card-footer">
                        <div style="width:100%">
                            <div class="progress-custom"><div class="progress-fill ${progressClass}" style="width: ${percent}%;"></div></div>
                            <div class="progress-label"><span><i class="fas fa-users"></i> 已报名 ${act.currentParticipants}</span><span>名额 ${act.maxParticipants}</span></div>
                        </div>
                        <div style="width:100%; display:flex; justify-content:flex-end; margin-top:0.5rem;">
                            ${!isMyActivity ? `<button class="btn-jingyun btn-sm signup-btn" data-id="${act.id}" ${!canSignup ? 'disabled' : ''}>${signupBtnText}</button>` : ''}
                            <button class="btn-jingyun-outline btn-sm collect-btn" data-id="${act.id}" data-collected="${isCollected}" ${isCollected ? 'disabled' : ''}>${isCollected ? '已收藏' : '收藏'}</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }
    function bindActivityEvents() {
        document.querySelectorAll('.signup-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                if (btn.disabled) return;
                try {
                    await fetchWithAuth(API_BASE_URL + '/activity/signup/' + id, { method: 'POST' });
                    alert('申请已提交，请等待审核');
                    loadActivities();
                } catch (err) { alert('报名失败：' + err.message); }
            });
        });
        document.querySelectorAll('.collect-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                const isCollected = btn.dataset.collected === 'true';
                if (isCollected) {
                    alert('已收藏，请在个人信息界面取消收藏');
                    return;
                }
                await addActivityCollection(id, btn);
            });
        });
        document.querySelectorAll('.end-activity').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!confirm('确定要结束该活动吗？')) return;
                const id = btn.dataset.id;
                try {
                    await fetchWithAuth(API_BASE_URL + '/activity/end/' + id, { method: 'POST' });
                    alert('活动已结束');
                    loadActivities();
                } catch (err) { alert('操作失败：' + err.message); }
            });
        });
        document.querySelectorAll('.edit-activity').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                const act = allActivities.find(a => a.id == id);
                if (!act) { alert('活动不存在'); return; }
                showEditActivityModal(act);
            });
        });
        document.querySelectorAll('.view-activity-signups').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                await showActivitySignupsModal(id);
            });
        });
    }
    async function showActivitySignupsModal(activityId) {
        try {
            const signups = await fetchWithAuth(API_BASE_URL + '/activity/' + activityId + '/signups');
            const activity = allActivities.find(a => a.id == activityId);
            const title = activity ? `报名列表 - ${activity.title}` : '活动报名列表';
            let html = '';
            if (!signups || !signups.length) {
                html = '<div class="no-data">暂无报名</div>';
            } else {
                html = signups.map(s => `
                    <div class="signup-item">
                        <div class="signup-info">
                            ${s.username ? `<strong>${escapeHtml(s.username)}</strong> ` : ''}
                            申请时间：${new Date(s.applyTime).toLocaleString()}
                            <span class="badge ${s.status === 'pending' ? 'bg-warning' : (s.status === 'accepted' ? 'bg-success' : 'bg-danger')}">${s.status === 'pending' ? '待审核' : (s.status === 'accepted' ? '已通过' : '已拒绝')}</span>
                        </div>
                        ${isInheritor && activity && activity.inheritorId === currentUser.id && s.status === 'pending' ? `
                        <div class="signup-actions">
                            <button class="btn-jingyun btn-sm approve-activity-signup" data-id="${s.id}" data-activity-id="${activityId}">同意</button>
                            <button class="btn-jingyun-outline btn-sm reject-activity-signup" data-id="${s.id}" data-activity-id="${activityId}">拒绝</button>
                        </div>
                        ` : ''}
                    </div>
                `).join('');
                if (isInheritor && activity && activity.inheritorId === currentUser.id) {
                    setTimeout(() => {
                        document.querySelectorAll('#activitySignupsModal .approve-activity-signup').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const signupId = btn.dataset.id;
                                const actId = btn.dataset.activityId;
                                try {
                                    await fetchWithAuth(API_BASE_URL + '/activity/signup/' + signupId + '/approve', { method: 'POST' });
                                    alert('已同意');
                                    showActivitySignupsModal(actId);
                                } catch (err) { alert('操作失败：' + err.message); }
                            });
                        });
                        document.querySelectorAll('#activitySignupsModal .reject-activity-signup').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const signupId = btn.dataset.id;
                                const actId = btn.dataset.activityId;
                                try {
                                    await fetchWithAuth(API_BASE_URL + '/activity/signup/' + signupId + '/reject', { method: 'POST' });
                                    alert('已拒绝');
                                    showActivitySignupsModal(actId);
                                } catch (err) { alert('操作失败：' + err.message); }
                            });
                        });
                    }, 50);
                }
            }
            document.getElementById('activitySignupsModalTitle').innerText = title;
            document.getElementById('activitySignupsModalBody').innerHTML = html;
            showModal('activitySignupsModal');
        } catch (err) { alert('加载报名列表失败：' + err.message); }
    }
    function showEditActivityModal(act) {
        document.getElementById('editActivityId').value = act.id;
        document.getElementById('editActivityTitle').value = act.title;
        document.getElementById('editActivityType').value = act.type;
        document.getElementById('editActivityStartTime').value = new Date(act.startTime).toISOString().slice(0,16);
        document.getElementById('editActivityEndTime').value = new Date(act.endTime).toISOString().slice(0,16);
        document.getElementById('editActivityMaxParticipants').value = act.maxParticipants;
        document.getElementById('editActivityDesc').value = act.description;
        document.getElementById('editActivityCurrentImage').src = act.imageUrl || '';
        document.getElementById('editActivityImageUrl').value = act.imageUrl || '';
        document.getElementById('editActivitySiteId').value = act.siteId || '';
        showModal('editActivityModal');
    }
    document.getElementById('submitEditActivityBtn')?.addEventListener('click', async () => {
        const id = document.getElementById('editActivityId').value;
        const title = document.getElementById('editActivityTitle').value.trim();
        const type = document.getElementById('editActivityType').value;
        const startTime = document.getElementById('editActivityStartTime').value;
        const endTime = document.getElementById('editActivityEndTime').value;
        const maxParticipants = parseInt(document.getElementById('editActivityMaxParticipants').value);
        const description = document.getElementById('editActivityDesc').value.trim();
        const siteId = document.getElementById('editActivitySiteId').value ? parseInt(document.getElementById('editActivitySiteId').value) : null;
        const imageFile = document.getElementById('editActivityImageFile').files[0];
        let imageUrl = document.getElementById('editActivityImageUrl').value;
        if (!title || !startTime || !endTime || !description) { alert('请填写必填项'); return; }
        try {
            if (imageFile) imageUrl = await uploadImage(imageFile, 'activity');
            await fetchWithAuth(API_BASE_URL + '/activity/' + id, {
                method: 'PUT',
                body: JSON.stringify({ title, type, startTime, endTime, maxParticipants, description, siteId, imageUrl })
            });
            alert('更新成功');
            hideModal('editActivityModal');
            loadActivities();
        } catch (err) { alert('更新失败：' + err.message); }
    });

    document.getElementById('moreActivitiesBtn')?.addEventListener('click', async () => {
        try {
            const activities = await fetchWithAuth(API_BASE_URL + '/activity/list?status=1');
            const grid = document.getElementById('allActivitiesGrid');
            const empty = document.getElementById('allActivitiesEmpty');
            if (!activities.length) {
                grid.innerHTML = '';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                const collected = {};
                for (const act of activities) {
                    collected[act.id] = await checkActivityCollected(act.id);
                }
                let html = '';
                for (const act of activities) {
                    const isMyActivity = isInheritor && act.inheritorId === currentUser.id;
                    const isFull = act.currentParticipants >= act.maxParticipants;
                    const isEnded = new Date(act.endTime) < new Date();
                    const canSignup = !isMyActivity && !isFull && !isEnded && act.status === 1;
                    const signupBtnHtml = !isMyActivity ? `<button class="btn-jingyun btn-sm signup-btn" data-id="${act.id}" ${!canSignup ? 'disabled' : ''}>${isEnded ? '已结束' : (isFull ? '已满' : '报名')}</button>` : '';
                    const collectBtnHtml = `<button class="btn-jingyun-outline btn-sm collect-btn" data-id="${act.id}" data-collected="${collected[act.id]}" ${collected[act.id] ? 'disabled' : ''}>${collected[act.id] ? '已收藏' : '收藏'}</button>`;
                    let actionHtml = '';
                    if (isInheritor && isMyActivity) {
                        actionHtml = `

    async function loadMessages(limit = 3) {
        try {
            const messages = await fetchWithAuth(API_BASE_URL + '/forum/messages?limit=30');
            const container = document.getElementById('messageList');
            if (!container) return;
            if (!messages || !messages.length) {

    function displayMessages(messages) {
        const container = document.getElementById('messageList');
        if (!container) return;
        if (!messages || !messages.length) {
            container.innerHTML = '<div class="no-data">暂无交流</div>';
            return;
        }
        container.innerHTML = messages.map(m => {
            const userName = m.userName || '匿名';
            const content = m.content || '';
            const createdAt = m.createdAt ? new Date(m.createdAt).toLocaleString() : '时间未知';
            return `
                <div class="message-item">
                    <div class="message-avatar"><i class="fas fa-user"></i></div>
                    <div class="message-content">
                        <div class="message-header"><span class="message-name">${escapeHtml(userName)}</span><span class="message-time">${createdAt}</span></div>
                        <div class="message-text">${escapeHtml(content)}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

        const input = document.getElementById('questionInput');

            await fetchWithAuth(API_BASE_URL + '/forum/post', {
                method: 'POST',
                body: JSON.stringify({ content })
            });

                <div class="message-item">

                    </div>
                </div>
            `;
        }
        const modalHtml = `
            <div class="custom-modal-overlay" id="dynamicAllMessagesModal">
                <div class="custom-modal">
                    <div class="custom-modal-header"><span class="custom-modal-title">全部交流</span><button class="custom-modal-close">&times;</button></div>
                    <div class="custom-modal-body">${html}</div>
                    <div class="custom-modal-footer"><button class="btn-custom-close close-modal">关闭</button></div>
                </div>
            </div>
        `;
        const existing = document.getElementById('dynamicAllMessagesModal');
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modalEl = document.getElementById('dynamicAllMessagesModal');
        modalEl.querySelectorAll('.custom-modal-close, .close-modal').forEach(btn => {
            btn.addEventListener('click', () => modalEl.remove());

    function renderRecruitActions(recruit, isMyPost) {
        let actions = `<button class="btn-jingyun-outline btn-sm view-recruit-applications" data-id="${recruit.id}"><i class="fas fa-users"></i> 查看申请</button>`;
        if (isMyPost) {

            actions += `<button class="btn-jingyun-outline btn-sm edit-recruit" data-id="${recruit.id}">编辑</button>`;
        } else {
            const userStatus = recruit.userStatus || 'none';
            if (userStatus === 'none') actions += `<button class="btn-jingyun btn-sm apply-recruit" data-id="${recruit.id}">申请</button>`;
            else if (userStatus === 'pending') actions += `<span class="text-warning">待审核</span>`;
            else if (userStatus === 'accepted') actions += `<span class="text-success">已参与</span>`;
            else actions += `<span class="text-danger">已拒绝</span>`;
        }
        return actions;

            }
            showModal('moreRecruitsModal');
        } catch (err) { alert('加载招募失败：' + err.message); }
    });

    const publishToggleBtn = document.getElementById('publishBtn');
    const publishMenuDiv = document.getElementById('publishMenu');
    if (publishToggleBtn && publishMenuDiv) {
        publishToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            publishMenuDiv.style.display = publishMenuDiv.style.display === 'none' ? 'flex' : 'none';
        });
        document.addEventListener('click', (e) => {
            if (!publishMenuDiv.contains(e.target) && e.target !== publishToggleBtn) {
                publishMenuDiv.style.display = 'none';
            }
        });
    }
    document.querySelectorAll('[data-publish]').forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.dataset.publish;
            publishMenuDiv.style.display = 'none';
            if (type === 'activity') showModal('publishActivityModal');
            else if (type === 'artwork') showModal('publishArtworkModal');
            else if (type === 'recruit') showModal('publishRecruitModal');
        });
    });

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    async function init() {
        const token = getToken();
        if (!token) { alert('请先登录'); window.location.href = 'Index.html'; return; }
        await loadUserInfo();
        await Promise.all([loadActivities(), loadArtworks(), loadMessages(3), loadRecruits()]);
    }
    init();
})();
</script>
</body>
</html>
