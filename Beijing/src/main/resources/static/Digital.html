<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京韵遗风 · 数字展厅</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="/js/lunar.js"></script>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .calendar-card {
            background: rgba(255, 248, 235, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #c9af8b;
            border-radius: 2.5rem;
            padding: 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 20px 40px rgba(60, 40, 20, 0.4);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .calendar-card::before {
            content: "⚲⚲⚲";
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 10rem;
            opacity: 0.03;
            transform: rotate(15deg);
            pointer-events: none;
            font-family: serif;
            color: #8b623f;
        }
        .calendar-card::after {
            content: "⚘⚘⚘";
            position: absolute;
            bottom: -30px;
            left: -20px;
            font-size: 8rem;
            opacity: 0.03;
            transform: rotate(-10deg);
            pointer-events: none;
            font-family: serif;
            color: #a6552b;
        }

        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .calendar-nav {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            background: rgba(182, 132, 78, 0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .calendar-nav button {
            background: #b6844e;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            color: white;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(100, 60, 20, 0.3);
        }

        .calendar-nav button:hover {
            background: #c79b65;
            transform: scale(1.1);
        }

        .calendar-nav span {
            font-size: 1.8rem;
            font-weight: 600;
            color: inherit;
            min-width: 180px;
            text-align: center;
            font-family: 'STKaiti', serif;
            text-shadow: 1px 1px 2px rgba(150, 100, 50, 0.2);
        }

        .year-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.3);
            padding: 0.3rem 1.2rem 0.3rem 1rem;
            border-radius: 60px;
            font-size: 1.2rem;
            color: #5a3e2b;
            border: 1px solid #d6bc9a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            backdrop-filter: blur(4px);
        }
        .year-info i {
            font-size: 1.5rem;
            color: #a6552b;
        }

        .today-btn {
            background: #b6844e;
            border: none;
            border-radius: 60px;
            padding: 0.6rem 1.8rem;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(100, 60, 20, 0.3);
            border-bottom: 3px solid #7b5937;
        }

        .today-btn:hover {
            background: #c79b65;
            transform: translateY(-2px);
            border-bottom-width: 2px;
        }

        /* 本月非遗概览 */
        .month-heritage {
            background: rgba(200, 170, 130, 0.2);
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #5a3e2b;
            border: 1px dashed #b99e7c;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }
        .month-heritage span {
            background: #b6844e;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .month-heritage i {
            color: #a6552b;
            margin-right: 0.3rem;
        }

        /* 日历网格 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .weekday {
            text-align: center;
            font-weight: 600;
            color: inherit;
            padding: 0.8rem;
            font-size: 1.2rem;
            background: rgba(182, 132, 78, 0.1);
            border-radius: 40px;
            margin-bottom: 0.3rem;
        }

        .calendar-cell {
            background: rgba(250, 240, 225, 0.8);
            backdrop-filter: blur(2px);
            border: 1px solid #d6bc9a;
            border-radius: 1.5rem;
            padding: 0.6rem 0.3rem;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(100, 70, 30, 0.1);
        }

        .calendar-cell:hover {
            border-color: #b6844e;
            background: rgba(255, 248, 235, 1);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 20px rgba(120, 80, 40, 0.3);
            z-index: 5;
        }

        .calendar-cell.today {
            border: 3px solid #b6844e;
            background: rgba(255, 235, 210, 0.9);
            box-shadow: 0 0 0 2px #f7d9b3 inset, 0 8px 16px rgba(180, 120, 50, 0.3);
        }

        .calendar-cell.has-term {
            background: rgba(230, 210, 180, 0.8);
            border-left: 5px solid #a6552b;
        }

        .calendar-cell.has-special {
            background: rgba(210, 190, 160, 0.8);
            border-right: 5px solid #b6844e;
        }

        .calendar-cell.empty {
            background: transparent;
            border: 1px dashed #d6bc9a;
            box-shadow: none;
            cursor: default;
        }

        .calendar-cell.empty:hover {
            transform: none;
            border-color: #d6bc9a;
        }

        .day-number {
            font-weight: 700;
            font-size: 1.4rem;
            color: inherit;
            width: 100%;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 0.2rem;
        }

        .lunar-month, .lunar-day {
            font-size: 0.75rem;
            color: #8d765b;
            text-align: center;
            width: 100%;
        }
        .lunar-month {
            margin-bottom: 0.1rem;
            font-weight: 500;
        }
        .lunar-day {
            font-weight: 400;
        }

        .solar-term, .special-day {
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 40px;
            padding: 0.15rem 0.5rem;
            margin-top: 0.2rem;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 2px 4px rgba(100, 40, 10, 0.3);
        }

        .solar-term {
            background: #a6552b;
        }

        .special-day {
            background: #b6844e;
        }

        .heritage-mark {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: #b6844e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .calendar-cell[data-heritage]:hover .heritage-mark {
            opacity: 1;
            transform: scale(1.2);
        }

        /* 原有数字展厅样式 */
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .category-tag {
            background: rgba(245, 235, 215, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #b89b78;
            border-radius: 40px;
            padding: 0.6rem 1.8rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: #4f351f;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(100, 70, 30, 0.1);
            display: inline-flex;
            align-items: center;
        }

        .category-tag i { margin-right: 8px; color: #b45f2e; }
        .category-tag.active {
            background: #a97c53;
            border-color: #6d4b2a;
            color: #fff6e5;
            box-shadow: 0 6px 12px #6d4b2a80;
        }
        .category-tag.active i { color: #ffdba5; }

        .row-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            justify-content: center;
        }

        .heritage-card {
            background: rgba(255, 248, 235, 0.85);
            backdrop-filter: blur(6px);
            border: 1px solid #d6bc9a;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(60, 40, 20, 0.3);
            transition: 0.25s;
            width: calc(25% - 1.4rem);
            min-width: 240px;
            cursor: pointer;
        }

        .heritage-card:hover {
            transform: translateY(-8px);
            border-color: #b6844e;
            box-shadow: 0 20px 32px #4f2e18;
        }

        .card-img-top {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #bc9f7e;
        }

        .card-body { padding: 1.2rem 1rem 1rem; }
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2e1e12;
            font-family: 'STKaiti', serif;
        }
        .card-category {
            font-size: 0.9rem;
            background: #dccbb4;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #3e2b1b;
            margin-bottom: 0.8rem;
        }
        .card-text {
            color: #4f3a28;
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            background: transparent;
            border-top: 1px dashed #bba27b;
            padding: 0.8rem 1rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #7b5b3c;
            font-size: 0.9rem;
        }

        .collect-btn {
            background: #b6844e;
            border: none;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .collect-btn:hover:not(:disabled) {
            background: #c79b65;
        }
        .collect-btn:disabled {
            background: #8a6d4e;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* 自定义模态框样式 */
        .custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .custom-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .custom-modal {
            background: #fff6e8;
            border: 3px solid #ad8865;
            border-radius: 2rem;
            width: 90%;
            max-width: 1000px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .custom-modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 2px solid #c7a97e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .custom-modal-title {
            font-size: 2.2rem;
            font-family: 'STKaiti', serif;
            color: #3c291b;
        }
        .custom-modal-close {
            background: none;
            border: none;
            font-size: 3rem;
            line-height: 1;
            cursor: pointer;
            color: #8d765b;
            transition: color 0.2s;
        }
        .custom-modal-close:hover {
            color: #a6552b;
        }
        .custom-modal-body {
            padding: 2rem;
            overflow-y: auto;
            color: #2e1e12;
        }
        .custom-modal-footer {
            padding: 1rem 2rem;
            border-top: 1px solid #d6bc9a;
            text-align: right;
        }
        .btn-custom-close {
            background: #b6844e;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1.8rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-custom-close:hover {
            background: #c79b65;
        }

        /* 详情内部样式 */
        .detail-section {
            background: #faefe0;
            border-radius: 1.5rem;
            padding: 1.4rem;
            margin-bottom: 1.8rem;
            border: 1px solid #dabd9b;
            box-shadow: inset 0 1px 4px #ffecca;
        }
        .section-title {
            font-size: 1.5rem;
            color: #633f20;
            border-left: 8px solid #a6552b;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
        }
        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.8rem 1.5rem;
        }
        .info-label { font-weight: 600; color: #815f3f; }
        .info-value { color: #2e1e12; }
        .inheritor-card {
            background: #e9d9c6;
            border-radius: 1.2rem;
            padding: 1.2rem;
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }
        .inheritor-avatar {
            width: 80px;
            height: 80px;
            background: #bb9d7c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #4f2f14;
        }
        .related-grid {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .related-item {
            background: #dacbb6;
            border-radius: 1.2rem;
            padding: 0.8rem;
            width: calc(33.333% - 0.7rem);
            text-align: center;
            border: 1px solid #b2916d;
            transition: background 0.3s, border-color 0.3s;
            cursor: pointer;
        }
        .related-item img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 1rem;
        }
        .chart-container {
            width: 100%;
            height: 250px;
            background: #f8ede0;
            border-radius: 1.2rem;
            padding: 0.5rem;
        }

        /* 主题覆盖 */
        body.theme-dark .heritage-card,
        body.theme-dark .custom-modal,
        body.theme-dark .detail-section,
        body.theme-dark .inheritor-card,
        body.theme-dark .related-item,
        body.theme-dark .chart-container,
        body.theme-dark .category-tag,
        body.theme-dark .calendar-card,
        body.theme-dark .calendar-cell,
        body.theme-dark .calendar-nav,
        body.theme-dark .month-heritage,
        body.theme-dark .year-info {
            background: #2d2d2d !important;
            border-color: #5a4a3a !important;
            color: #e0e0e0 !important;
        }
        body.theme-dark .card-title,
        body.theme-dark .card-text,
        body.theme-dark .card-footer,
        body.theme-dark .custom-modal-title,
        body.theme-dark .section-title,
        body.theme-dark .info-label,
        body.theme-dark .info-value,
        body.theme-dark .lunar-month,
        body.theme-dark .lunar-day {
            color: #e0e0e0 !important;
        }
        body.theme-dark .category-tag.active {
            background: #5a4a3a !important;
            border-color: #b6844e !important;
        }
        body.theme-dark .card-category {
            background: #5a4a3a !important;
            color: #e0e0e0 !important;
        }
        body.theme-dark .weekday {
            background: #3d3d3d !important;
        }
        body.theme-soft .heritage-card,
        body.theme-soft .custom-modal,
        body.theme-soft .detail-section,
        body.theme-soft .inheritor-card,
        body.theme-soft .related-item,
        body.theme-soft .chart-container,
        body.theme-soft .category-tag,
        body.theme-soft .calendar-card,
        body.theme-soft .calendar-cell,
        body.theme-soft .calendar-nav,
        body.theme-soft .month-heritage,
        body.theme-soft .year-info {
            background: #fff8e7 !important;
            border-color: #d6bc9a !important;
            color: #5f4b3a !important;
        }
        body.theme-soft .card-title,
        body.theme-soft .card-text,
        body.theme-soft .card-footer,
        body.theme-soft .custom-modal-title,
        body.theme-soft .section-title,
        body.theme-soft .info-label,
        body.theme-soft .info-value,
        body.theme-soft .lunar-month,
        body.theme-soft .lunar-day {
            color: #5f4b3a !important;
        }
        body.theme-soft .category-tag.active {
            background: #d6bc9a !important;
            border-color: #b6844e !important;
        }
        body.theme-soft .card-category {
            background: #d6bc9a !important;
            color: #5f4b3a !important;
        }
        body.theme-soft .weekday {
            background: #efe2d0 !important;
        }
    </style>
</head>

<!-- 日历逻辑（使用 lunar.js） -->
<script>
    (function() {

        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        let currentYear, currentMonth;
        const today = new Date();
        const todayYear = today.getFullYear();
        const todayMonth = today.getMonth() + 1;
        const todayDay = today.getDate();

        currentYear = todayYear;
        currentMonth = todayMonth;

        const calendarGrid = document.getElementById('calendarGrid');
        const displayYearMonth = document.getElementById('displayYearMonth');
        const yearInfoSpan = document.getElementById('yearInfo');
        const monthHeritageDiv = document.getElementById('monthHeritage');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');
        const todayBtn = document.getElementById('todayBtn');

        // 生肖图标映射
        const shengXiaoIconMap = {
            '鼠': 'fa-rat',
            '牛': 'fa-cow',
            '虎': 'fa-tiger',
            '兔': 'fa-rabbit',
            '龙': 'fa-dragon',
            '蛇': 'fa-snake',
            '马': 'fa-horse',
            '羊': 'fa-goat',
            '猴': 'fa-monkey',
            '鸡': 'fa-rooster',
            '狗': 'fa-dog',
            '猪': 'fa-pig'
        };

        // 获取某天的节气名称
        function getTermName(year, month, day) {
            try {
                const solar = Solar.fromYmd(year, month, day);
                const lunar = solar.getLunar();
                return lunar.getJieQi();
            } catch (e) {
                return '';
            }
        }

        // 获取某天的特殊非遗日信息
        function getSpecialDayInfo(year, month, day) {
            const key = `${year}-${month}-${day}`;
            return specialHeritageDays[key] || null;
        }

        // 获取指定月份第一天的干支生肖及图标
        function getYearGanZhiShengXiao(year, month) {
            try {
                const solar = Solar.fromYmd(year, month, 1);
                const lunar = solar.getLunar();
                const ganZhi = lunar.getYearInGanZhi();
                const shengXiao = lunar.getYearShengXiao();
                return { ganZhi, shengXiao };
            } catch (e) {
                return { ganZhi: '', shengXiao: '' };
            }
        }

        // 更新本月非遗概览（收集当月有非遗的日期名称）
        function updateMonthHeritage(year, month) {
            const daysInMonth = new Date(year, month, 0).getDate();
            let heritageNames = [];
            for (let d = 1; d <= daysInMonth; d++) {
                const term = getTermName(year, month, d);
                if (term && solarTermHeritage[term]) {
                    heritageNames.push(solarTermHeritage[term].name);
                }
                const special = getSpecialDayInfo(year, month, d);
                if (special) {
                    heritageNames.push(special.name);
                }
            }
            // 去重并取前5个
            const unique = [...new Set(heritageNames)].slice(0,5);
            if (unique.length > 0) {
                monthHeritageDiv.innerHTML = `<i class="fas fa-leaf"></i> 本月非遗：` + unique.map(name => `<span>${name}</span>`).join(' ');
            } else {
                monthHeritageDiv.innerHTML = `<i class="fas fa-leaf"></i> 本月无特殊非遗日`;
            }
        }

        // 渲染日历
        function renderCalendar(year, month) {
            try {
                let html = '';
                weekdays.forEach(w => {
                    html += `<div class="weekday">${w}</div>`;
                });

                const firstDay = new Date(year, month - 1, 1).getDay();
                const daysInMonth = new Date(year, month, 0).getDate();

                for (let i = 0; i < firstDay; i++) {
                    html += `<div class="calendar-cell empty"></div>`;
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    // 获取节气
                    const termName = getTermName(year, month, d);
                    // 获取特殊非遗日
                    const specialInfo = getSpecialDayInfo(year, month, d);
                    // 获取农历信息
                    let lunarMonthStr = '', lunarDayStr = '';
                    try {
                        const solar = Solar.fromYmd(year, month, d);
                        const lunar = solar.getLunar();
                        lunarMonthStr = lunar.getMonthInChinese(); // 如 "正月"
                        lunarDayStr = lunar.getDayInChinese();     // 如 "初一"
                    } catch (e) {}

                    const isToday = (year === todayYear && month === todayMonth && d === todayDay);
                    const hasTerm = termName !== '';
                    const hasSpecial = specialInfo !== null;

                    let cellClass = 'calendar-cell';
                    if (isToday) cellClass += ' today';
                    if (hasTerm) cellClass += ' has-term';
                    if (hasSpecial) cellClass += ' has-special';

                    // 构建内容
                    let contentHtml = `<div class="day-number">${d}</div>`;
                    if (lunarMonthStr && lunarDayStr) {
                        contentHtml += `<div class="lunar-month">${lunarMonthStr}</div>`;
                        contentHtml += `<div class="lunar-day">${lunarDayStr}</div>`;
                    }
                    // 优先显示节气名称，如果没有节气但有特殊日，显示特殊日名称
                    if (hasTerm) {
                        contentHtml += `<div class="solar-term">${termName}</div>`;
                    } else if (hasSpecial) {
                        contentHtml += `<div class="special-day">${specialInfo.name}</div>`;
                    }

                    // 构建 data-heritage 属性（用于悬浮提示和点击详情）
                    let dataHeritage = '';
                    if (hasTerm && solarTermHeritage[termName]) {
                        dataHeritage = solarTermHeritage[termName].name + '：' + solarTermHeritage[termName].desc;
                    } else if (hasSpecial) {
                        dataHeritage = specialInfo.name + '：' + specialInfo.desc;
                    }

                    const hasHeritage = hasTerm || hasSpecial;
                    const markHtml = hasHeritage ? '<div class="heritage-mark"><i class="fas fa-leaf"></i></div>' : '';

                    html += `<div class="${cellClass}" data-date="${year}-${month}-${d}" data-term="${termName}" data-special="${hasSpecial ? specialInfo.name : ''}" data-heritage="${dataHeritage}">
                        ${contentHtml}
                        ${markHtml}
                    </div>`;
                }

                const totalCells = firstDay + daysInMonth;
                const remainder = totalCells % 7;
                if (remainder !== 0) {
                    for (let i = 0; i < 7 - remainder; i++) {
                        html += `<div class="calendar-cell empty"></div>`;
                    }
                }

                calendarGrid.innerHTML = html;
                displayYearMonth.innerText = `${year}年${month}月`;

                // 更新年份干支生肖及图标
                const { ganZhi, shengXiao } = getYearGanZhiShengXiao(year, month);
                const iconClass = shengXiaoIconMap[shengXiao] || 'fa-paw';
                yearInfoSpan.innerHTML = `<i class="fas ${iconClass}"></i> ${ganZhi}${shengXiao}年`;

                // 更新本月非遗概览
                updateMonthHeritage(year, month);

                // 绑定点击事件
                document.querySelectorAll('.calendar-cell[data-date]').forEach(cell => {
                    cell.addEventListener('click', function() {
                        const term = this.dataset.term;
                        const special = this.dataset.special;
                        const heritage = this.dataset.heritage;
                        const date = this.dataset.date;

                        let title = '';
                        let content = '';

                        if (term) {
                            const heritageInfo = solarTermHeritage[term] || { name: term + '习俗', desc: heritage || '暂无详细描述' };
                            title = term;
                            content = `<p><strong>日期：</strong>${date}</p>
                                       <p><strong>非遗活动：</strong>${heritageInfo.name}</p>
                                       <p><strong>介绍：</strong>${heritageInfo.desc}</p>`;
                        } else if (special) {
                            const specialInfo = specialHeritageDays[date] || { name: special, desc: heritage || '暂无详细描述' };
                            title = special;
                            content = `<p><strong>日期：</strong>${date}</p>
                                       <p><strong>非遗活动：</strong>${specialInfo.name}</p>
                                       <p><strong>介绍：</strong>${specialInfo.desc}</p>`;
                        } else {
                            alert(`公历：${date}`);
                            return;
                        }

                        document.getElementById('solarTermModalTitle').innerText = title;
                        document.getElementById('solarTermModalBody').innerHTML = content;
                        document.getElementById('solarTermModalOverlay').classList.add('show');
                    });
                });
            } catch (e) {
                console.error('渲染日历出错', e);
                calendarGrid.innerHTML = `<div class="calendar-error">日历加载失败，请稍后重试</div>`;
            }
        }

        // 事件绑定
        if (prevMonthBtn && nextMonthBtn && todayBtn) {
            prevMonthBtn.addEventListener('click', () => {
                if (currentMonth === 1) {
                    currentYear--;
                    currentMonth = 12;
                } else {
                    currentMonth--;
                }
                renderCalendar(currentYear, currentMonth);
            });

            nextMonthBtn.addEventListener('click', () => {
                if (currentMonth === 12) {
                    currentYear++;
                    currentMonth = 1;
                } else {
                    currentMonth++;
                }
                renderCalendar(currentYear, currentMonth);
            });

            todayBtn.addEventListener('click', () => {
                currentYear = todayYear;
                currentMonth = todayMonth;
                renderCalendar(currentYear, currentMonth);
            });
        }

        // 关闭节气/非遗日模态框
        const solarTermModal = document.getElementById('solarTermModalOverlay');
        if (document.getElementById('solarTermModalCloseBtn')) {
            document.getElementById('solarTermModalCloseBtn').addEventListener('click', () => {
                solarTermModal.classList.remove('show');
            });
        }
        if (document.getElementById('solarTermModalFooterClose')) {
            document.getElementById('solarTermModalFooterClose').addEventListener('click', () => {
                solarTermModal.classList.remove('show');
            });
        }
        if (solarTermModal) {
            solarTermModal.addEventListener('click', function(e) {
                if (e.target === solarTermModal) {
                    solarTermModal.classList.remove('show');
                }
            });
        }

        // 初始渲染
        renderCalendar(currentYear, currentMonth);
    })();
</script>

        async function loadCategories() {
            try {
                const categories = await fetchWithAuth(`${API_BASE_URL}/heritage/categories`);
                const filterDiv = document.getElementById('categoryFilter');
                let html = `<span class="category-tag active" data-category="all"><i class="fas fa-cubes"></i> 全部</span>`;
                categories.forEach(cat => { html += `<span class="category-tag" data-category="${cat}"><i class="fas fa-tag"></i> ${cat}</span>`; });
                filterDiv.innerHTML = html;
                document.querySelectorAll('.category-tag').forEach(tag => {
                    tag.addEventListener('click', function() {
                        document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                        this.classList.add('active');
                        loadHeritageItems(this.dataset.category);
                    });
                });
            } catch (err) { console.error(err); }
        }

        async function loadHeritageItems(category = 'all') {
            try {
                const url = category === 'all' ? `${API_BASE_URL}/heritage/list` : `${API_BASE_URL}/heritage/list?category=${encodeURIComponent(category)}`;
                const items = await fetchWithAuth(url);
                if (items && items.length > 0) {
                    allItems = items;
                } else {
                    if (category === 'all') {
                        allItems = mockHeritageData;
                    } else {
                        allItems = mockHeritageData.filter(item => item.category === category);
                    }
                }
                renderCards(allItems);
            } catch (err) {
                console.error('加载失败，使用模拟数据', err);
                if (category === 'all') {
                    allItems = mockHeritageData;
                } else {
                    allItems = mockHeritageData.filter(item => item.category === category);
                }
                renderCards(allItems);
            }
        }

        function renderCards(items) {
            const grid = document.getElementById('heritageGrid');
            if (!items.length) { grid.innerHTML = '<div class="text-center text-muted">暂无项目</div>'; return; }
            grid.innerHTML = items.map(item => `
                <div class="heritage-card" data-id="${item.id}">
                    <img src="${item.imageUrl || 'https://picsum.photos/400/200?random=' + item.id}" class="card-img-top" alt="${item.name}">
                    <div class="card-body">
                        <div class="card-title">${item.name}</div>
                        <div class="card-category"><i class="fas fa-tag"></i> ${item.category}</div>
                        <p class="card-text">${item.description || '暂无描述'}</p>
                    </div>
                    <div class="card-footer">
                        <span><i class="fas fa-user"></i> ${item.inheritorId ? '传承人ID: ' + item.inheritorId : '无传承人'}</span>
                        <button class="collect-btn" data-id="${item.id}" data-collected="false">收藏</button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.heritage-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('collect-btn')) return;
                    showDetail(card.dataset.id);
                });
            });

            document.querySelectorAll('.collect-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    if (btn.disabled) return;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/collection/add`, {
                            method: 'POST',
                            body: JSON.stringify({ targetType: 'item', targetId: id })
                        });
                        alert('收藏成功！');
                        btn.disabled = true;
                        btn.innerText = '已收藏';
                    } catch (err) {
                        alert('收藏失败：' + err.message);
                    }
                });
            });
        }

        async function showDetail(id) {
            try {
                let item = allItems.find(i => i.id == id);
                if (!item) {
                    item = await fetchWithAuth(`${API_BASE_URL}/heritage/${id}`);
                }
                const related = allItems.filter(i => i.category === item.category && i.id !== item.id).slice(0, 3);

                modalTitle.innerText = item.name;
                modalBody.innerHTML = `
                    <div class="detail-section">
                        <h3 class="section-title"><i class="fas fa-info-circle"></i> 项目信息</h3>
                        <div class="info-grid">
                            <span class="info-label">类别：</span><span class="info-value">${item.category}</span>
                            <span class="info-label">申报地区：</span><span class="info-value">${item.region || '未知'}</span>
                            <span class="info-label">遗产编号：</span><span class="info-value">${item.number || '无'}</span>
                            <span class="info-label">详细介绍：</span><span class="info-value">${item.description || '暂无'}</span>
                        </div>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title"><i class="fas fa-user-tie"></i> 传承人档案</h3>
                        <div class="inheritor-card">
                            <div class="inheritor-avatar"><i class="fas fa-user-circle"></i></div>
                            <div class="inheritor-info">
                                <p><strong>姓名：</strong> ${item.inheritorId ? '传承人ID: ' + item.inheritorId : '未知'}</p>
                                <p><strong>级别：</strong> 国家级（模拟）</p>
                                <p><strong>师承：</strong> 王青山 → 张明 → 李长林 （模拟）</p>
                                <p><strong>代表作品：</strong> 《龙凤呈祥》《福寿万年》等（模拟）</p>
                            </div>
                        </div>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title"><i class="fas fa-thumbs-up"></i> 相关推荐</h3>
                        <div class="related-grid" id="relatedGrid"></div>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title"><i class="fas fa-chart-line"></i> 年代热度趋势 (模拟)</h3>
                        <div id="trendChart" class="chart-container"></div>
                        <p class="text-muted mt-2 small">*数据基于用户关注度模拟生成</p>
                    </div>
                `;

                const relatedGrid = document.getElementById('relatedGrid');
                if (relatedGrid) {
                    relatedGrid.innerHTML = related.map(r => `
                        <div class="related-item" data-id="${r.id}">
                            <img src="${r.imageUrl || 'https://picsum.photos/400/200?random=' + r.id}" alt="${r.name}">
                            <div class="mt-2 fw-bold">${r.name}</div>
                            <div class="small">${r.inheritorId ? '传承人ID: ' + r.inheritorId : '无传承人'}</div>
                        </div>
                    `).join('');
                    document.querySelectorAll('.related-item').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const rid = el.dataset.id;
                            if (rid) showDetail(parseInt(rid));
                        });
                    });
                }

                setTimeout(() => {
                    const chartDom = document.getElementById('trendChart');
                    if (chartDom) {
                        const myChart = echarts.init(chartDom);
                        myChart.setOption({
                            backgroundColor: 'transparent',
                            grid: { left: '8%', right: '5%', top: 20, bottom: 20 },
                            xAxis: { type: 'category', data: ['1980','1990','2000','2010','2020','2026'], axisLabel: { color: '#5a3e28' } },
                            yAxis: { type: 'value', name: '关注指数', nameTextStyle: { color: '#7b5c3e' }, axisLabel: { color: '#5a3e28' } },
                            series: [{
                                data: [120,250,480,820,1340,2100],
                                type: 'line',
                                smooth: true,
                                lineStyle: { color: '#b45f2e', width: 4 },
                                areaStyle: { color: 'rgba(180,95,46,0.2)' },
                                symbol: 'circle',
                                symbolSize: 8
                            }],
                            tooltip: { trigger: 'item' }
                        });
                        window.addEventListener('resize', () => myChart.resize());
                    }
                }, 50);

                openModal();
            } catch (err) {
                alert('加载详情失败：' + err.message);
            }
        }

        async function init() {
            const token = getToken();
            if (!token) { alert('请先登录'); window.location.href = 'Index.html'; return; }

            await loadCategories();
            await loadHeritageItems('all');
        }
        init();
    })();
</script>
</body>
</html>
