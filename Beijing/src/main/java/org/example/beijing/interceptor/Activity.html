<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京韵遗风 · 传承人互动平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <script src="/js/common.js"></script>
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .role-bar {
            background: rgba(255, 248, 235, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 0.8rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #b99e7c;
            transition: background 0.3s, border-color 0.3s;
        }

        .role-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .role-badge {
            background: #a97c53;
            color: #fff6e5;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 600;
            color: #3c291b;
            border-left: 10px solid #a6552b;
            padding-left: 1.5rem;
            margin: 2rem 0 1.5rem;
            font-family: 'STKaiti', serif;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title .title-icon-text {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .section-title i { color: #a6552b; }

        .heritage-card {
            background: rgba(255, 248, 235, 0.85);
            backdrop-filter: blur(6px);
            border: 1px solid #d6bc9a;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(60, 40, 20, 0.3);
            transition: 0.25s, background 0.3s, border-color 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .heritage-card:hover {
            border-color: #b6844e;
            transform: translateY(-5px);
        }

        .card-img-top {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #bc9f7e;
        }

        .card-body {
            padding: 1.2rem 1rem 1rem;
            flex: 1;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2e1e12;
            margin-bottom: 0.3rem;
            font-family: 'STKaiti', serif;
            transition: color 0.3s;
        }

        .card-sub {
            font-size: 0.9rem;
            color: #815f3f;
            margin-bottom: 0.5rem;
        }

        .card-text {
            color: #4f3a28;
            font-size: 0.95rem;
        }

        .card-footer {
            background: transparent;
            border-top: 1px dashed #bba27b;
            padding: 0.8rem 1rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .btn-sm { font-size: 0.8rem; padding: 0.3rem 0.8rem; }

        .progress-custom {
            width: 100%;
            height: 8px;
            background-color: #e9dac8;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.3rem;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .progress-fill.low { background-color: #28a745; }
        .progress-fill.medium { background-color: #ffc107; }
        .progress-fill.high { background-color: #dc3545; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #6b4f33;
            margin-top: 0.2rem;
        }

        .artwork-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .artwork-item {
            background: #faefe0;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid #d6bc9a;
            box-shadow: 0 6px 12px rgba(60, 40, 20, 0.2);
            transition: background 0.3s, border-color 0.3s;
        }

        .artwork-item img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .artwork-info {
            padding: 0.8rem;
            text-align: center;
        }

        .artwork-info strong { color: inherit; }

        .message-board {
            background: #faefe0;
            border: 2px solid #dabd9b;
            border-radius: 2rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            transition: background 0.3s, border-color 0.3s;
        }

        .message-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px dashed #bba27b;
        }

        .message-avatar {
            width: 50px;
            height: 50px;
            background: #b6844e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff2d7;
            font-size: 1.4rem;
            transition: background 0.3s;
        }

        .message-content { flex: 1; }

        .message-header {
            display: flex;
            justify-content: space-between;
            color: inherit;
            margin-bottom: 0.3rem;
        }

        .message-name { font-weight: 600; }
        .message-time { font-size: 0.8rem; color: #8d765b; }
        .message-text { color: inherit; word-break: break-word; }

        .reply-input {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .reply-input input {
            flex: 1;
            border: 1px solid #c6a77c;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            background: #fffcf2;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .recruit-list {
            list-style: none;
            padding: 0;
        }

        .recruit-item {
            background: #faefe0;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border: 1px solid #dabd9b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            transition: background 0.3s, border-color 0.3s;
        }

        .recruit-info h4 {
            font-size: 1.2rem;
            color: #2e1e12;
            margin-bottom: 0.3rem;
        }

        .recruit-info p {
            margin: 0;
            color: #6b4f33;
            font-size: 0.9rem;
        }

        .recruit-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .float-publish {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #b6844e;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            box-shadow: 0 8px 16px #4f2e18;
            cursor: pointer;
            transition: 0.2s;
            z-index: 100;
            border: 2px solid #e3cfb5;
        }

        .float-publish:hover {
            background: #c79b65;
            transform: scale(1.1);
        }

        .float-publish-menu {
            position: fixed;
            bottom: 120px;
            right: 2rem;
            background: rgba(255, 248, 235, 0.95);
            backdrop-filter: blur(8px);
            border: 2px solid #b6844e;
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }
        .float-publish-menu button {
            white-space: nowrap;
        }

        .modal-jingyun .modal-content {
            background: #fff6e8;
            border: 3px solid #ad8865;
            border-radius: 2rem;
            transition: background 0.3s, border-color 0.3s;
        }

        .more-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .more-btn-center {
            text-align: center;
            margin: 1.5rem 0;
        }
        .modal-card-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .artwork-card {
            position: relative;
        }
        .artwork-actions {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.3rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .artwork-card:hover .artwork-actions {
            opacity: 1;
        }
        .activity-actions {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
            max-height: 60vh;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .modal-card {
            background: #faefe0;
            border: 1px solid #d6bc9a;
            border-radius: 1.2rem;
            padding: 0.8rem;
            transition: background 0.3s;
        }

        .modal-card h5 { font-size: 1.1rem; margin-bottom: 0.3rem; }
        .modal-card p { font-size: 0.85rem; margin: 0.2rem 0; }

        .no-data {
            color: #dc3545 !important;
            text-align: center;
            width: 100%;
            margin: 2rem 0;
            display: block;
            flex: 0 0 100%;
            grid-column: 1 / -1;
        }
        .signup-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #d6bc9a;
        }
        .signup-info {
            flex: 1;
        }
        .signup-actions {
            display: flex;
            gap: 0.5rem;
        }
        .badge {
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        .bg-warning { background-color: #ffc107; color: #212529; }
        .bg-success { background-color: #28a745; color: white; }
        .bg-danger { background-color: #dc3545; color: white; }

        body.theme-dark .role-bar,
        body.theme-dark .heritage-card,
        body.theme-dark .artwork-item,
        body.theme-dark .message-board,
        body.theme-dark .recruit-item,
        body.theme-dark .modal-content,
        body.theme-dark .modal-card,
        body.theme-dark .float-publish-menu {
            background: #2d2d2d !important;
            border-color: #5a4a3a !important;
            color: #e0e0e0 !important;
        }
        body.theme-dark .card-title,
        body.theme-dark .card-text,
        body.theme-dark .card-sub,
        body.theme-dark .message-name,
        body.theme-dark .message-time,
        body.theme-dark .message-text,
        body.theme-dark .recruit-info h4,
        body.theme-dark .recruit-info p {
            color: #e0e0e0 !important;
        }
        body.theme-dark .message-avatar {
            background: #5a4a3a !important;
        }
        body.theme-dark .reply-input input {
            background: #3d3d3d !important;
            border-color: #5a4a3a !important;
            color: #e0e0e0 !important;
        }

        body.theme-soft .role-bar,
        body.theme-soft .heritage-card,
        body.theme-soft .artwork-item,
        body.theme-soft .message-board,
        body.theme-soft .recruit-item,
        body.theme-soft .modal-content,
        body.theme-soft .modal-card,
        body.theme-soft .float-publish-menu {
            background: #fff8e7 !important;
            border-color: #d6bc9a !important;
            color: #5f4b3a !important;
        }
        body.theme-soft .card-title,
        body.theme-soft .card-text,
        body.theme-soft .card-sub,
        body.theme-soft .message-name,
        body.theme-soft .message-time,
        body.theme-soft .message-text,
        body.theme-soft .recruit-info h4,
        body.theme-soft .recruit-info p {
            color: #5f4b3a !important;
        }
        body.theme-soft .message-avatar {
            background: #c2a27e !important;
        }
        body.theme-soft .reply-input input {
            background: #fff8e7 !important;
            border-color: #d6bc9a !important;
            color: #5f4b3a !important;
        }

        #moreActivitiesBtn, #moreArtworksBtn, #moreRecruitsBtn {
            color: #ffffff !important;
        }
        body.theme-soft #moreActivitiesBtn,
        body.theme-soft #moreArtworksBtn,
        body.theme-soft #moreRecruitsBtn {
            color: #000000 !important;
        }
    </style>
</head>
<body>
<div class="float-publish" id="publishBtn" title="发布内容" style="display: none;">
    <i class="fas fa-plus"></i>
</div>
<div class="float-publish-menu" id="publishMenu">
    <button class="btn-jingyun" data-publish="activity"><i class="fas fa-calendar-alt"></i> 发布活动</button>
    <button class="btn-jingyun" data-publish="artwork"><i class="fas fa-palette"></i> 发布作品</button>
    <button class="btn-jingyun" data-publish="recruit"><i class="fas fa-users"></i> 发布招募</button>
</div>

<div class="container-jingyun">
    <nav class="navbar-jingyun d-flex justify-content-between align-items-center">
        <div class="navbar-brand"><i class="fas fa-landmark"></i> 京韵遗风·互动平台</div>
        <div class="d-flex">
            <a href="Index.html" class="nav-link-jingyun"><i class="fas fa-home"></i> 首页</a>
            <a href="Digital.html" class="nav-link-jingyun"><i class="fas fa-building"></i> 数字展厅</a>
            <a href="Map.html" class="nav-link-jingyun"><i class="fas fa-map-location-dot"></i> 非遗地图</a>
            <a href="AI.html" class="nav-link-jingyun"><i class="fas fa-robot"></i> 京小智</a>
            <a href="Data.html" class="nav-link-jingyun"><i class="fas fa-chart-pie"></i> 数据看板</a>
            <a href="Activity.html" class="nav-link-jingyun active"><i class="fas fa-handshake"></i> 传承人平台</a>
            <a href="Person.html" class="nav-link-jingyun"><i class="fas fa-user"></i> 我的护照</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>传·承·人·互·动·平·台</h1>
        <p>工坊 · 非遗交流 · 作品 · 招募</p>
    </div>

    <div class="role-bar">
        <div class="role-info">
            <i class="fas fa-user-circle" style="font-size: 2rem; color: #8b623f;"></i>
            <span>当前身份：<span class="role-badge" id="roleDisplay">加载中...</span></span>
            <span class="text-muted small" style="margin-left: 1rem;">邀请码认证后可发布内容</span>
        </div>
        <div><i class="fas fa-ticket-alt"></i> 邀请码: <strong>JINGYUN-2026</strong></div>
    </div>

    <div class="section-title">
        <div class="title-icon-text"><i class="fas fa-calendar-alt"></i> 近期工坊 / 活动</div>
    </div>
    <div class="row row-cols-1 row-cols-md-3 g-4 mb-4" id="activityGrid"></div>
    <div class="more-btn-center">
        <button class="btn-jingyun-outline btn-sm" id="moreActivitiesBtn">更多活动</button>
    </div>

    <div class="section-title">
        <div class="title-icon-text"><i class="fas fa-palette"></i> 传承人最新作品</div>
    </div>
    <div class="artwork-grid mb-5" id="artworkGrid"></div>
    <div class="more-btn-center">
        <button class="btn-jingyun-outline btn-sm" id="moreArtworksBtn">更多作品</button>
    </div>

    <!-- 非遗交流板块 -->
    <div class="section-title">
        <div class="title-icon-text"><i class="fas fa-comments"></i> 非遗交流</div>
    </div>
    <div class="message-board">
        <div id="messageList"></div>
        <div class="more-btn-center">
            <button class="btn-jingyun-outline btn-sm" id="moreMessagesBtn">查看更多</button>
        </div>
        <div class="reply-input">
            <input type="text" id="questionInput" placeholder="写下您的交流内容...">
            <button class="btn-jingyun" id="askBtn"><i class="fas fa-paper-plane"></i> 发布</button>
        </div>
    </div>

    <div class="section-title">
        <div class="title-icon-text"><i class="fas fa-users"></i> 学徒招募</div>
    </div>
    <div class="recruit-list" id="recruitList"></div>
    <div class="more-btn-center">
        <button class="btn-jingyun-outline btn-sm" id="moreRecruitsBtn">更多招募</button>
    </div>

    <div class="footer-note">
        <i class="fas fa-copyright"></i> 京韵遗风 · 数字博物馆  |  活态传承 你我同行
    </div>
</div>

<!-- 发布招募模态框 -->
<div class="modal fade modal-jingyun" id="publishRecruitModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">发布学徒招募</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="publishRecruitForm">
                    <div class="mb-3"><label class="form-label">招募标题</label><input type="text" class="form-control" id="recruitTitle" required></div>
                    <div class="mb-3"><label class="form-label">招募描述</label><textarea class="form-control" id="recruitDesc" rows="3" required></textarea></div>
                    <div class="mb-3"><label class="form-label">传承人姓名</label><input type="text" class="form-control" id="recruitInheritor" required></div>
                    <div class="mb-3"><label class="form-label">最大申请人数</label><input type="number" class="form-control" id="recruitMaxApplicants" value="10" min="1" required></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-jingyun" id="submitPublishRecruit">发布</button>
            </div>
        </div>
    </div>
</div>

<!-- 发布活动模态框 -->
<div class="modal fade modal-jingyun" id="publishActivityModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">发布活动</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="publishActivityForm">
                    <div class="mb-3"><label class="form-label">活动标题</label><input type="text" class="form-control" id="activityTitle" required></div>
                    <div class="mb-3"><label class="form-label">活动类型</label>
                        <select class="form-select" id="activityType">
                            <option value="体验课">体验课</option>
                            <option value="讲座">讲座</option>
                            <option value="展览">展览</option>
                            <option value="演出">演出</option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label">开始时间</label><input type="datetime-local" class="form-control" id="activityStartTime" required></div>
                    <div class="mb-3"><label class="form-label">结束时间</label><input type="datetime-local" class="form-control" id="activityEndTime" required></div>
                    <div class="mb-3"><label class="form-label">最大参与人数</label><input type="number" class="form-control" id="activityMaxParticipants" value="10" min="1"></div>
                    <div class="mb-3"><label class="form-label">活动描述</label><textarea class="form-control" id="activityDesc" rows="3" required></textarea></div>
                    <div class="mb-3"><label class="form-label">活动封面</label>
                        <div class="d-flex align-items-center gap-2">
                            <input type="file" class="form-control" id="activityImageFile" accept="image/*" required>
                            <span class="text-muted small" id="activityFileName"></span>
                        </div>
                    </div>
                    <div class="mb-3"><label class="form-label">点位ID（可选）</label><input type="number" class="form-control" id="activitySiteId" placeholder="可选"></div>
                    <input type="hidden" id="activityImageUrl">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-jingyun" id="submitPublishActivity">发布</button>
            </div>
        </div>
    </div>
</div>

<!-- 发布作品模态框 -->
<div class="modal fade modal-jingyun" id="publishArtworkModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">发布作品</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="publishArtworkForm">
                    <div class="mb-3"><label class="form-label">作品标题</label><input type="text" class="form-control" id="artworkTitle" required></div>
                    <div class="mb-3"><label class="form-label">作品描述</label><textarea class="form-control" id="artworkDesc" rows="3" required></textarea></div>
                    <div class="mb-3"><label class="form-label">作品图片</label>
                        <div class="d-flex align-items-center gap-2">
                            <input type="file" class="form-control" id="artworkImageFile" accept="image/*" required>
                            <span class="text-muted small" id="artworkFileName"></span>
                        </div>
                    </div>
                    <input type="hidden" id="artworkImageUrl">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-jingyun" id="submitPublishArtwork">发布</button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑活动模态框 -->
<div class="modal fade modal-jingyun" id="editActivityModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑活动</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

    <div class="theme-btn light active" data-theme="light"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
    (function() {
        const API_BASE_URL = 'http://localhost:8080/api';
        let currentUser = null;
        let isInheritor = false;
        let allMessages = [];

        async function loadUserInfo() {
            try {
                currentUser = await fetchWithAuth(`${API_BASE_URL}/user/info`);
                isInheritor = currentUser.role === 'inheritor';
                updateRoleUI();
            } catch (err) { console.error('获取用户信息失败', err); }
        }

        function updateRoleUI() {
            const roleDisplay = document.getElementById('roleDisplay');
            roleDisplay.innerText = isInheritor ? '传承人' : '普通用户';
            roleDisplay.style.backgroundColor = isInheritor ? '#b6844e' : '#a97c53';
            const publishBtn = document.getElementById('publishBtn');
            publishBtn.style.display = isInheritor ? 'flex' : 'none';
            const inviteCodeSpan = document.querySelector('.role-bar div:last-child');
            const smallHint = document.querySelector('.role-info .small');
            if (isInheritor) {
                if (inviteCodeSpan) inviteCodeSpan.style.display = 'none';
                if (smallHint) smallHint.style.display = 'none';
            } else {
                if (inviteCodeSpan) inviteCodeSpan.style.display = 'block';
                if (smallHint) smallHint.style.display = 'inline-block';
            }
        }

        // 发布菜单逻辑
        const publishBtn = document.getElementById('publishBtn');
        const publishMenu = document.getElementById('publishMenu');
        if (publishBtn) {
            publishBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                publishMenu.style.display = publishMenu.style.display === 'none' ? 'flex' : 'none';
            });
            document.addEventListener('click', (e) => {
                if (publishMenu && !publishMenu.contains(e.target) && e.target !== publishBtn) {
                    publishMenu.style.display = 'none';
                }
            });
        }

        document.querySelectorAll('[data-publish]').forEach(btn => {
            btn.addEventListener('click', function() {
                const type = this.dataset.publish;
                publishMenu.style.display = 'none';
                if (type === 'activity') new bootstrap.Modal(document.getElementById('publishActivityModal')).show();
                else if (type === 'artwork') new bootstrap.Modal(document.getElementById('publishArtworkModal')).show();
                else if (type === 'recruit') new bootstrap.Modal(document.getElementById('publishRecruitModal')).show();
            });
        });

        async function uploadImage(file, type) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('type', type);
            return await uploadWithAuth(`${API_BASE_URL}/upload/image`, formData);
        }

        // ========== 活动板块 ==========
        let allActivities = [];
        async function loadActivities() {
            try {
                allActivities = await fetchWithAuth(`${API_BASE_URL}/activity/list?status=1`);
                const grid = document.getElementById('activityGrid');
                if (!allActivities || allActivities.length === 0) {
                    grid.innerHTML = '<div class="no-data">暂无活动</div>';
                    return;
                }
                const displayActivities = allActivities.slice(0, 3);
                grid.innerHTML = displayActivities.map(act => renderActivityCard(act, true)).join('');
                bindActivityEvents();
            } catch (err) {
                console.error('加载活动失败', err);
                document.getElementById('activityGrid').innerHTML = '<div class="no-data">加载失败</div>';
            }
        }

        function getProgressClass(percent) {
            if (percent < 50) return 'low';
            if (percent < 80) return 'medium';
            return 'high';
        }

        function renderActivityCard(act, showActions = true) {
            const isMyActivity = isInheritor && act.inheritorId === currentUser.id;
            const isFull = act.currentParticipants >= act.maxParticipants;
            const now = new Date();
            const endTime = new Date(act.endTime);
            const isEnded = endTime < now;
            const canSignup = !isMyActivity && !isFull && !isEnded && act.status === 1;
            const signupBtnText = isEnded ? '已结束' : (isFull ? '已满' : '报名');
            const signupDisabled = !canSignup;
            const percent = act.maxParticipants > 0 ? (act.currentParticipants / act.maxParticipants) * 100 : 0;
            const progressClass = getProgressClass(percent);
            let actionButtons = '';
            if (showActions && isInheritor && isMyActivity) {
                actionButtons = `
                    <div class="activity-actions">
                        <button class="btn-jingyun-outline btn-sm view-activity-signups" data-id="${act.id}"><i class="fas fa-users"></i> 查看申请</button>
                        <button class="btn-jingyun-outline btn-sm edit-activity" data-id="${act.id}"><i class="fas fa-edit"></i> 编辑</button>
                        ${act.status === 1 ? `<button class="btn-jingyun-outline btn-sm end-activity" data-id="${act.id}"><i class="fas fa-stop"></i> 结束</button>` : ''}
                    </div>
                `;
            } else if (!isMyActivity) {
                actionButtons = `
                    <div class="activity-actions">
                        <button class="btn-jingyun-outline btn-sm view-activity-signups" data-id="${act.id}"><i class="fas fa-users"></i> 查看申请</button>
                    </div>
                `;
            }
            return `
                <div class="col">
                    <div class="heritage-card" data-id="${act.id}">
                        <img src="${act.imageUrl || 'https://picsum.photos/400/200?random=' + act.id}" class="card-img-top" alt="${act.title}">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(act.title)}</h5>
                            <div class="card-sub"><i class="fas fa-user"></i> 传承人ID: ${act.inheritorId}</div>
                            <div class="card-sub"><i class="fas fa-clock"></i> ${new Date(act.startTime).toLocaleString()} ~ ${new Date(act.endTime).toLocaleString()}</div>
                            <p class="card-text">${escapeHtml(act.description || '暂无描述')}</p>
                            ${actionButtons}
                        </div>
                        <div class="card-footer">
                            <div style="width: 100%;">
                                <div class="progress-custom">
                                    <div class="progress-fill ${progressClass}" style="width: ${percent}%;"></div>
                                </div>
                                <div class="progress-label">
                                    <span><i class="fas fa-users"></i> 已报名 ${act.currentParticipants}</span>
                                    <span>名额 ${act.maxParticipants}</span>
                                </div>
                            </div>
                            <div style="width: 100%; display: flex; justify-content: flex-end; margin-top: 0.5rem;">
                                ${!isMyActivity ? `<button class="btn-jingyun btn-sm signup-btn" data-id="${act.id}" ${signupDisabled ? 'disabled' : ''}>${signupBtnText}</button>` : ''}
                                <button class="btn-jingyun-outline btn-sm collect-btn ms-2" data-id="${act.id}">收藏</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function bindActivityEvents() {
            document.querySelectorAll('.signup-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const activityId = this.dataset.id;
                    if (this.disabled) return;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/activity/signup/${activityId}`, { method: 'POST' });
                        alert('申请已提交，请等待审核');
                        loadActivities();
                    } catch (err) { alert('报名失败：' + err.message); }
                });
            });
            document.querySelectorAll('.collect-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const activityId = this.dataset.id;
                    if (this.disabled) return;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/collection/add`, {
                            method: 'POST',
                            body: JSON.stringify({ targetType: 'activity', targetId: activityId })
                        });
                        alert('收藏成功！');
                        this.disabled = true;
                        this.innerText = '已收藏';
                    } catch (err) { alert('收藏失败：' + err.message); }
                });
            });
            document.querySelectorAll('.end-activity').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    if (!confirm('确定要结束该活动吗？')) return;
                    const activityId = this.dataset.id;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/activity/end/${activityId}`, { method: 'POST' });
                        alert('活动已结束');
                        loadActivities();
                    } catch (err) { alert('操作失败：' + err.message); }
                });
            });
            document.querySelectorAll('.edit-activity').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const activityId = this.dataset.id;
                    try {
                        const act = allActivities.find(a => a.id == activityId);
                        if (!act) { alert('活动不存在'); return; }
                        document.getElementById('editActivityId').value = act.id;
                        document.getElementById('editActivityTitle').value = act.title;
                        document.getElementById('editActivityType').value = act.type;
                        const start = new Date(act.startTime);
                        const end = new Date(act.endTime);
                        document.getElementById('editActivityStartTime').value = start.toISOString().slice(0,16);
                        document.getElementById('editActivityEndTime').value = end.toISOString().slice(0,16);
                        document.getElementById('editActivityMaxParticipants').value = act.maxParticipants;
                        document.getElementById('editActivityDesc').value = act.description;
                        document.getElementById('editActivityCurrentImage').src = act.imageUrl || '';
                        document.getElementById('editActivityImageUrl').value = act.imageUrl || '';
                        document.getElementById('editActivitySiteId').value = act.siteId || '';
                        new bootstrap.Modal(document.getElementById('editActivityModal')).show();
                    } catch (err) { alert('加载失败：' + err.message); }
                });
            });
            document.querySelectorAll('.view-activity-signups').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const activityId = this.dataset.id;
                    await loadActivitySignups(activityId);
                    new bootstrap.Modal(document.getElementById('activitySignupsModal')).show();
                });
            });
        }

        async function loadActivitySignups(activityId) {
            try {
                const signups = await fetchWithAuth(`${API_BASE_URL}/activity/${activityId}/signups`);
                const container = document.getElementById('activitySignupsList');
                const empty = document.getElementById('activitySignupsEmpty');
                const title = document.getElementById('activitySignupsModalTitle');
                const activity = allActivities.find(a => a.id == activityId);
                title.innerText = activity ? `报名列表 - ${activity.title}` : '活动报名列表';
                if (!signups || signups.length === 0) {
                    container.innerHTML = '';
                    empty.style.display = 'block';
                } else {
                    empty.style.display = 'none';
                    container.innerHTML = signups.map(s => `
                        <div class="signup-item" data-id="${s.id}">
                            <div class="signup-info">
                                ${s.username ? `<strong>${escapeHtml(s.username)}</strong> ` : ''}
                                申请时间：${new Date(s.applyTime).toLocaleString()}
                                <span class="badge ${s.status === 'pending' ? 'bg-warning' : (s.status === 'accepted' ? 'bg-success' : 'bg-danger')}">
                                    ${s.status === 'pending' ? '待审核' : (s.status === 'accepted' ? '已通过' : '已拒绝')}
                                </span>
                            </div>
                            ${isInheritor && activity && activity.inheritorId === currentUser.id && s.status === 'pending' ? `
                            <div class="signup-actions">
                                <button class="btn-jingyun btn-sm approve-activity-signup" data-id="${s.id}" data-activity-id="${activityId}">同意</button>
                                <button class="btn-jingyun-outline btn-sm reject-activity-signup" data-id="${s.id}" data-activity-id="${activityId}">拒绝</button>
                            </div>
                            ` : ''}
                        </div>
                    `).join('');
                    if (isInheritor && activity && activity.inheritorId === currentUser.id) {
                        document.querySelectorAll('.approve-activity-signup').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const signupId = btn.dataset.id;
                                const actId = btn.dataset.activityId;
                                try {
                                    await fetchWithAuth(`${API_BASE_URL}/activity/signup/${signupId}/approve`, { method: 'POST' });
                                    alert('已同意');
                                    await loadActivitySignups(actId);
                                } catch (err) { alert('操作失败：' + err.message); }
                            });
                        });
                        document.querySelectorAll('.reject-activity-signup').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const signupId = btn.dataset.id;
                                const actId = btn.dataset.activityId;
                                try {
                                    await fetchWithAuth(`${API_BASE_URL}/activity/signup/${signupId}/reject`, { method: 'POST' });
                                    alert('已拒绝');
                                    await loadActivitySignups(actId);
                                } catch (err) { alert('操作失败：' + err.message); }
                            });
                        });
                    }
                }
            } catch (err) { alert('加载报名列表失败：' + err.message); }
        }

        document.getElementById('submitEditActivity').addEventListener('click', async function() {
            const id = document.getElementById('editActivityId').value;
            const title = document.getElementById('editActivityTitle').value.trim();
            const type = document.getElementById('editActivityType').value;
            const startTime = document.getElementById('editActivityStartTime').value;
            const endTime = document.getElementById('editActivityEndTime').value;
            const maxParticipants = parseInt(document.getElementById('editActivityMaxParticipants').value);
            const description = document.getElementById('editActivityDesc').value.trim();
            const siteId = document.getElementById('editActivitySiteId').value ? parseInt(document.getElementById('editActivitySiteId').value) : null;
            const imageFile = document.getElementById('editActivityImageFile').files[0];
            let imageUrl = document.getElementById('editActivityImageUrl').value;
            if (!title || !startTime || !endTime || !description) { alert('请填写必填项'); return; }
            try {
                if (imageFile) imageUrl = await uploadImage(imageFile, 'activity');
                await fetchWithAuth(`${API_BASE_URL}/activity/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ title, type, startTime, endTime, maxParticipants, description, siteId, imageUrl })
                });
                alert('更新成功');
                bootstrap.Modal.getInstance(document.getElementById('editActivityModal')).hide();
                loadActivities();
            } catch (err) { alert('更新失败：' + err.message); }
        });

        document.getElementById('moreActivitiesBtn').addEventListener('click', async function() {
            try {
                const activities = await fetchWithAuth(`${API_BASE_URL}/activity/list?status=1`);
                const grid = document.getElementById('allActivitiesGrid');
                const empty = document.getElementById('allActivitiesEmpty');
                if (activities.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                } else {
                    empty.style.display = 'none';
                    grid.innerHTML = activities.map(act => `
                        <div class="modal-card" data-id="${act.id}">
                            <img src="${act.imageUrl || 'https://picsum.photos/400/200?random=' + act.id}" class="modal-card-img" alt="${act.title}">
                            <h5>${escapeHtml(act.title)}</h5>
                            <p>时间: ${new Date(act.startTime).toLocaleString()} ~ ${new Date(act.endTime).toLocaleString()}</p>
                            <p>名额: ${act.currentParticipants}/${act.maxParticipants}</p>
                            <p>传承人ID: ${act.inheritorId}</p>
                            <div class="d-flex gap-2 mt-2">
                                <button class="btn-jingyun btn-sm signup-btn" data-id="${act.id}" ${act.currentParticipants >= act.maxParticipants ? 'disabled' : ''}>报名</button>
                                <button class="btn-jingyun-outline btn-sm collect-btn" data-id="${act.id}">收藏</button>
                            </div>
                        </div>
                    `).join('');
                    bindModalActivityEvents();
                }
                new bootstrap.Modal(document.getElementById('moreActivitiesModal')).show();
            } catch (err) { alert('加载活动失败：' + err.message); }
        });

        function bindModalActivityEvents() {
            document.querySelectorAll('#allActivitiesGrid .signup-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const id = this.dataset.id;
                    if (this.disabled) return;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/activity/signup/${id}`, { method: 'POST' });
                        alert('申请已提交，请等待审核');
                        loadActivities();
                    } catch (err) { alert('报名失败：' + err.message); }
                });
            });
            document.querySelectorAll('#allActivitiesGrid .collect-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const id = this.dataset.id;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/collection/add`, {
                            method: 'POST',
                            body: JSON.stringify({ targetType: 'activity', targetId: id })
                        });
                        alert('收藏成功！');
                        this.disabled = true;
                        this.innerText = '已收藏';
                    } catch (err) { alert('收藏失败：' + err.message); }
                });
            });
        }

        // ========== 作品板块 ==========
        let allArtworks = [];
        async function loadArtworks() {
            try {
                allArtworks = await fetchWithAuth(`${API_BASE_URL}/artwork/latest?limit=6`);
                const grid = document.getElementById('artworkGrid');
                if (!allArtworks || allArtworks.length === 0) {
                    grid.innerHTML = '<div class="no-data">暂无作品</div>';
                    return;
                }
                grid.innerHTML = allArtworks.map(a => renderArtworkCard(a)).join('');
                bindArtworkEvents();
            } catch (err) {
                console.error('加载作品失败', err);
                document.getElementById('artworkGrid').innerHTML = '<div class="no-data">加载失败</div>';
            }
        }

        function renderArtworkCard(artwork) {
            let actionButtons = '';
            if (isInheritor && artwork.inheritorId === currentUser.id) {
                actionButtons = `
                    <div class="artwork-actions">
                        <button class="btn-jingyun-outline btn-sm edit-artwork" data-id="${artwork.id}"><i class="fas fa-edit"></i></button>
                        <button class="btn-jingyun-outline btn-sm delete-artwork" data-id="${artwork.id}"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            }
            return `
                <div class="artwork-item artwork-card" data-id="${artwork.id}">
                    <img src="${artwork.imageUrl}" alt="${artwork.title}">
                    ${actionButtons}
                    <div class="artwork-info">
                        <strong>${escapeHtml(artwork.title)}</strong>
                        <div class="small">${escapeHtml(artwork.description)}</div>
                    </div>
                </div>
            `;
        }

        function bindArtworkEvents() {
            document.querySelectorAll('.delete-artwork').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    if (!confirm('确定要删除该作品吗？')) return;
                    const artworkId = this.dataset.id;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/artwork/${artworkId}`, { method: 'DELETE' });
                        alert('删除成功');
                        loadArtworks();
                    } catch (err) { alert('删除失败：' + err.message); }
                });
            });
            document.querySelectorAll('.edit-artwork').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const artworkId = this.dataset.id;
                    const artwork = allArtworks.find(a => a.id == artworkId);
                    if (!artwork) { alert('作品不存在'); return; }
                    document.getElementById('editArtworkId').value = artwork.id;
                    document.getElementById('editArtworkTitle').value = artwork.title;
                    document.getElementById('editArtworkDesc').value = artwork.description;
                    document.getElementById('editArtworkCurrentImage').src = artwork.imageUrl;
                    document.getElementById('editArtworkImageUrl').value = artwork.imageUrl;
                    new bootstrap.Modal(document.getElementById('editArtworkModal')).show();
                });
            });
        }

        document.getElementById('submitEditArtwork').addEventListener('click', async function() {
            const id = document.getElementById('editArtworkId').value;
            const title = document.getElementById('editArtworkTitle').value.trim();
            const description = document.getElementById('editArtworkDesc').value.trim();
            const imageFile = document.getElementById('editArtworkImageFile').files[0];
            let imageUrl = document.getElementById('editArtworkImageUrl').value;
            if (!title || !description) { alert('请填写标题和描述'); return; }
            try {
                if (imageFile) imageUrl = await uploadImage(imageFile, 'artwork');
                await fetchWithAuth(`${API_BASE_URL}/artwork/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ title, description, imageUrl })
                });
                alert('更新成功');
                bootstrap.Modal.getInstance(document.getElementById('editArtworkModal')).hide();
                loadArtworks();
            } catch (err) { alert('更新失败：' + err.message); }
        });

        document.getElementById('moreArtworksBtn').addEventListener('click', async function() {
            try {
                const artworks = await fetchWithAuth(`${API_BASE_URL}/artwork/latest?limit=30`);
                const grid = document.getElementById('allArtworksGrid');
                const empty = document.getElementById('allArtworksEmpty');
                if (artworks.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                } else {
                    empty.style.display = 'none';
                    grid.innerHTML = artworks.map(a => `
                        <div class="modal-card">
                            <img src="${a.imageUrl}" class="modal-card-img" alt="${a.title}">
                            <h5>${escapeHtml(a.title)}</h5>
                            <p>${escapeHtml(a.description)}</p>
                        </div>
                    `).join('');
                }
                new bootstrap.Modal(document.getElementById('moreArtworksModal')).show();
            } catch (err) { alert('加载作品失败：' + err.message); }
        });

        // 非遗交流留言板
        async function loadMessages(limit = 3) {
            try {
                console.log('正在加载留言...');
                const messages = await fetchWithAuth(`${API_BASE_URL}/forum/messages?limit=30`);
                console.log('获取到的留言数据:', messages);
                if (!messages || messages.length === 0) {
                    console.log('暂无留言数据');
                    document.getElementById('messageList').innerHTML = '<div class="no-data">暂无交流，快来发布第一条留言吧~</div>';
                    allMessages = [];
                    return;
                }
                allMessages = messages;
                displayMessages(messages.slice(0, limit));
            } catch (err) {
                console.error('加载交流失败', err);
                document.getElementById('messageList').innerHTML = '<div class="no-data">加载失败，请检查网络连接</div>';
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messageList');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="no-data">暂无交流，快来发布第一条留言吧~</div>';
                return;
            }
            container.innerHTML = messages.map(m => {
                // 处理可能的空值
                const userName = m.userName || '匿名';
                const content = m.content || '';
                const createdAt = m.createdAt ? new Date(m.createdAt).toLocaleString() : '时间未知';
                return `
                    <div class="message-item">
                        <div class="message-avatar"><i class="fas fa-user"></i></div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-name">${escapeHtml(userName)}</span>
                                <span class="message-time">${createdAt}</span>
                            </div>
                            <div class="message-text">${escapeHtml(content)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('askBtn').addEventListener('click', async function() {
            const input = document.getElementById('questionInput');
            const content = input.value.trim();
            if (!content) { alert('请输入内容'); return; }
            try {
                await fetchWithAuth(`${API_BASE_URL}/forum/post`, {
                    method: 'POST',
                    body: JSON.stringify({ content })
                });
                input.value = '';
                // 重新加载最新留言
                await loadMessages(3);
                // 同时刷新全部留言缓存（可选）
                console.log('发布成功，已刷新留言列表');
            } catch (err) {
                alert('发布失败：' + err.message);
            }
        });

        document.getElementById('moreMessagesBtn').addEventListener('click', function() {
            const modalBody = document.getElementById('allMessagesList');
            if (!allMessages || allMessages.length === 0) {
                modalBody.innerHTML = '<div class="no-data">暂无交流</div>';
            } else {
                modalBody.innerHTML = allMessages.map(m => {
                    const userName = m.userName || '匿名';
                    const content = m.content || '';
                    const createdAt = m.createdAt ? new Date(m.createdAt).toLocaleString() : '时间未知';
                    return `
                        <div class="message-item">
                            <div class="message-avatar"><i class="fas fa-user"></i></div>
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="message-name">${escapeHtml(userName)}</span>
                                    <span class="message-time">${createdAt}</span>
                                </div>
                                <div class="message-text">${escapeHtml(content)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            new bootstrap.Modal(document.getElementById('allMessagesModal')).show();
        });

        // ========== 招募板块 ==========
        let allRecruits = [];
        async function loadRecruits() {
            try {
                allRecruits = await fetchWithAuth(`${API_BASE_URL}/recruit/list`);
                const activeRecruits = allRecruits.filter(r => r.status === 0);
                displayRecruits(activeRecruits.slice(0, 3));
            } catch (err) {
                console.error('加载招募失败', err);
                document.getElementById('recruitList').innerHTML = '<div class="no-data">暂无招募</div>';
            }
        }

        function displayRecruits(recruits) {
            const container = document.getElementById('recruitList');
            if (recruits.length === 0) {
                container.innerHTML = '<div class="no-data">暂无招募</div>';
                return;
            }
            container.innerHTML = recruits.map(recruit => {
                const createTime = recruit.createTime ? new Date(recruit.createTime).toLocaleString() : '时间未知';
                const isMyPost = isInheritor && recruit.inheritorId === currentUser.id;
                return `
                    <div class="recruit-item" data-id="${recruit.id}">
                        <div class="recruit-info">
                            <h4><i class="fas fa-hands"></i> ${escapeHtml(recruit.title)}</h4>
                            <p>${escapeHtml(recruit.description)} — 传承人：${escapeHtml(recruit.inheritorName)}</p>
                            <p class="small">发布时间：${createTime} | 状态：${recruit.status === 0 ? '招募中' : '已结束'}</p>
                            <p class="small">申请人数：${recruit.applicantCount}/${recruit.maxApplicants}</p>
                        </div>
                        <div class="recruit-actions">
                            ${renderRecruitActions(recruit, isMyPost)}
                        </div>
                    </div>
                `;
            }).join('');
            bindRecruitEvents();
        }

        function renderRecruitActions(recruit, isMyPost) {
            let actions = `<button class="btn-jingyun-outline btn-sm view-recruit-applications" data-id="${recruit.id}"><i class="fas fa-users"></i> 查看申请</button>`;
            if (isMyPost) {
                if (recruit.status === 0) actions += `<button class="btn-jingyun-outline btn-sm end-recruit" data-id="${recruit.id}">结束</button>`;
                actions += `<button class="btn-jingyun-outline btn-sm edit-recruit" data-id="${recruit.id}">编辑</button>`;
            } else {
                const userStatus = recruit.userStatus || 'none';
                if (userStatus === 'none') actions += `<button class="btn-jingyun btn-sm apply-recruit" data-id="${recruit.id}">申请</button>`;
                else if (userStatus === 'pending') actions += `<span class="text-warning">待审核</span>`;
                else if (userStatus === 'accepted') actions += `<span class="text-success">已参与</span>`;
                else actions += `<span class="text-danger">已拒绝</span>`;
            }
            return actions;
        }

        function bindRecruitEvents() {
            document.querySelectorAll('.end-recruit').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    if (!confirm('确定要结束该招募吗？')) return;
                    const recruitId = this.dataset.id;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/recruit/end`, { method: 'POST', body: JSON.stringify({ recruitId }) });
                        alert('招募已结束');
                        loadRecruits();
                    } catch (err) { alert('操作失败：' + err.message); }
                });
            });
            document.querySelectorAll('.edit-recruit').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const recruitId = this.dataset.id;
                    const recruit = allRecruits.find(r => r.id == recruitId);
                    if (!recruit) { alert('招募不存在'); return; }
                    document.getElementById('editRecruitId').value = recruit.id;
                    document.getElementById('editRecruitTitle').value = recruit.title;
                    document.getElementById('editRecruitDesc').value = recruit.description;
                    document.getElementById('editRecruitInheritor').value = recruit.inheritorName;
                    new bootstrap.Modal(document.getElementById('editRecruitModal')).show();
                });
            });
            document.querySelectorAll('.apply-recruit').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const recruitId = this.dataset.id;
                    try {
                        await fetchWithAuth(`${API_BASE_URL}/recruit/apply`, { method: 'POST', body: JSON.stringify({ recruitId }) });
                        alert('申请已提交，请等待审核');
                        loadRecruits();
                    } catch (err) { alert('申请失败：' + err.message); }
                });
            });
            document.querySelectorAll('.view-recruit-applications').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const recruitId = this.dataset.id;
                    await loadRecruitApplications(recruitId);
                    new bootstrap.Modal(document.getElementById('recruitApplicationsModal')).show();
                });
            });
        }

        async function loadRecruitApplications(recruitId) {
            try {
                const apps = await fetchWithAuth(`${API_BASE_URL}/recruit/${recruitId}/applications`);
                const container = document.getElementById('recruitApplicationsList');
                const empty = document.getElementById('recruitApplicationsEmpty');
                const title = document.getElementById('recruitApplicationsModalTitle');
                const recruit = allRecruits.find(r => r.id == recruitId);
                title.innerText = recruit ? `申请列表 - ${recruit.title}` : '招募申请列表';
                if (!apps || apps.length === 0) {
                    container.innerHTML = '';
                    empty.style.display = 'block';
                } else {
                    empty.style.display = 'none';
                    container.innerHTML = apps.map(a => `
                        <div class="signup-item" data-id="${a.id}">
                            <div class="signup-info">
                                ${a.username ? `<strong>${escapeHtml(a.username)}</strong> ` : ''}
                                申请时间：${new Date(a.applyTime).toLocaleString()}
                                <span class="badge ${a.status === 'pending' ? 'bg-warning' : (a.status === 'accepted' ? 'bg-success' : 'bg-danger')}">
                                    ${a.status === 'pending' ? '待审核' : (a.status === 'accepted' ? '已通过' : '已拒绝')}
                                </span>
                            </div>
                            ${isInheritor && recruit && recruit.inheritorId === currentUser.id && a.status === 'pending' ? `
                            <div class="signup-actions">
                                <button class="btn-jingyun btn-sm approve-recruit-application" data-id="${a.id}" data-recruit-id="${recruitId}">同意</button>
                                <button class="btn-jingyun-outline btn-sm reject-recruit-application" data-id="${a.id}" data-recruit-id="${recruitId}">拒绝</button>
                            </div>
                            ` : ''}
                        </div>
                    `).join('');
                    if (isInheritor && recruit && recruit.inheritorId === currentUser.id) {
                        document.querySelectorAll('.approve-recruit-application').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const appId = btn.dataset.id;
                                const rId = btn.dataset.recruitId;
                                try {
                                    await fetchWithAuth(`${API_BASE_URL}/recruit/application/${appId}/approve`, { method: 'POST' });
                                    alert('已同意');
                                    await loadRecruitApplications(rId);
                                } catch (err) { alert('操作失败：' + err.message); }
                            });
                        });
                        document.querySelectorAll('.reject-recruit-application').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const appId = btn.dataset.id;
                                const rId = btn.dataset.recruitId;
                                try {
                                    await fetchWithAuth(`${API_BASE_URL}/recruit/application/${appId}/reject`, { method: 'POST' });
                                    alert('已拒绝');
                                    await loadRecruitApplications(rId);
                                } catch (err) { alert('操作失败：' + err.message); }
                            });
                        });
                    }
                }
            } catch (err) { alert('加载申请列表失败：' + err.message); }
        }

        document.getElementById('submitEditRecruit').addEventListener('click', async function() {
            const id = document.getElementById('editRecruitId').value;
            const title = document.getElementById('editRecruitTitle').value.trim();
            const description = document.getElementById('editRecruitDesc').value.trim();
            const inheritorName = document.getElementById('editRecruitInheritor').value.trim();
            if (!title || !description || !inheritorName) { alert('请填写所有字段'); return; }
            try {
                await fetchWithAuth(`${API_BASE_URL}/recruit/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ title, description, inheritorName })
                });
                alert('更新成功');
                bootstrap.Modal.getInstance(document.getElementById('editRecruitModal')).hide();
                loadRecruits();
            } catch (err) { alert('更新失败：' + err.message); }
        });

        document.getElementById('moreRecruitsBtn').addEventListener('click', function() {
            const modalBody = document.getElementById('allRecruitsList');
            if (!allRecruits || allRecruits.length === 0) {
                modalBody.innerHTML = '<div class="no-data">暂无招募</div>';
            } else {
                modalBody.innerHTML = allRecruits.map(r => `
                    <div class="modal-card">
                        <h5>${escapeHtml(r.title)}</h5>
                        <p>${escapeHtml(r.description)}</p>
                        <p>传承人：${escapeHtml(r.inheritorName)}</p>
                        <p>发布时间：${r.createTime ? new Date(r.createTime).toLocaleString() : '未知'}</p>
                        <p>状态：${r.status === 0 ? '招募中' : '已结束'}</p>
                        <p>申请人数：${r.applicantCount}/${r.maxApplicants}</p>
                    </div>
                `).join('');
            }
            new bootstrap.Modal(document.getElementById('moreRecruitsModal')).show();
        });

        // ========== 发布相关 ==========
        document.getElementById('submitPublishActivity').addEventListener('click', async function() {
            const title = document.getElementById('activityTitle').value.trim();
            const type = document.getElementById('activityType').value;
            const startTime = document.getElementById('activityStartTime').value;
            const endTime = document.getElementById('activityEndTime').value;
            const maxParticipants = parseInt(document.getElementById('activityMaxParticipants').value);
            const description = document.getElementById('activityDesc').value.trim();
            const siteId = document.getElementById('activitySiteId').value ? parseInt(document.getElementById('activitySiteId').value) : null;
            const imageFile = document.getElementById('activityImageFile').files[0];
            if (!title || !startTime || !endTime || !description) { alert('请填写必填项'); return; }
            if (!imageFile) { alert('请上传活动封面图片'); return; }
            try {
                let imageUrl = '';
                if (imageFile) imageUrl = await uploadImage(imageFile, 'activity');
                await fetchWithAuth(`${API_BASE_URL}/activity/publish`, {
                    method: 'POST',
                    body: JSON.stringify({
                        title, type, startTime, endTime, maxParticipants, description, siteId,
                        imageUrl, inheritorId: currentUser.id
                    })
                });
                alert('活动发布成功');
                bootstrap.Modal.getInstance(document.getElementById('publishActivityModal')).hide();
                document.getElementById('publishActivityForm').reset();
                document.getElementById('activityFileName').innerText = '';
                loadActivities();
            } catch (err) { alert('发布失败：' + err.message); }
        });

        document.getElementById('submitPublishArtwork').addEventListener('click', async function() {
            const title = document.getElementById('artworkTitle').value.trim();
            const description = document.getElementById('artworkDesc').value.trim();
            const imageFile = document.getElementById('artworkImageFile').files[0];
            if (!title || !description) { alert('请填写标题和描述'); return; }
            if (!imageFile) { alert('请上传作品图片'); return; }
            try {
                const imageUrl = await uploadImage(imageFile, 'artwork');
                await fetchWithAuth(`${API_BASE_URL}/artwork/publish`, {
                    method: 'POST',
                    body: JSON.stringify({ title, description, imageUrl })
                });
                alert('作品发布成功');
                bootstrap.Modal.getInstance(document.getElementById('publishArtworkModal')).hide();
                document.getElementById('publishArtworkForm').reset();
                document.getElementById('artworkFileName').innerText = '';
                loadArtworks();
            } catch (err) { alert('发布失败：' + err.message); }
        });

        document.getElementById('submitPublishRecruit').addEventListener('click', async function() {
            const title = document.getElementById('recruitTitle').value.trim();
            const description = document.getElementById('recruitDesc').value.trim();
            const inheritorName = document.getElementById('recruitInheritor').value.trim();
            const maxApplicants = parseInt(document.getElementById('recruitMaxApplicants').value);
            if (!title || !description || !inheritorName || !maxApplicants) { alert('请填写所有字段'); return; }
            try {
                await fetchWithAuth(`${API_BASE_URL}/recruit/add`, {
                    method: 'POST',
                    body: JSON.stringify({ title, description, inheritorName, maxApplicants })
                });
                alert('招募发布成功');
                bootstrap.Modal.getInstance(document.getElementById('publishRecruitModal')).hide();
                document.getElementById('publishRecruitForm').reset();
                loadRecruits();
            } catch (err) { alert('发布失败：' + err.message); }
        });

        async function init() {
            const token = getToken();
            if (!token) { alert('请先登录'); window.location.href = 'Index.html'; return; }
            await loadUserInfo();
            await loadActivities();
            await loadArtworks();
            await loadMessages(3);
            await loadRecruits();
        }
        init();
    })();
</script>
</body>
</html>
